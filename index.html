<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GovernanceHub</title>
<style>
:root{
  --bg:#f4f6f9;--surface:#fff;--border:#e2e6ea;
  --text:#1a1d23;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --blue:#2563eb;--blue-light:#eff6ff;--blue-mid:#bfdbfe;
  --green:#16a34a;--green-light:#f0fdf4;--green-mid:#bbf7d0;
  --yellow:#ca8a04;--yellow-light:#fefce8;--yellow-mid:#fde68a;
  --red:#dc2626;--red-light:#fef2f2;--red-mid:#fecaca;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --orange:#ea580c;--orange-light:#fff7ed;
  --teal:#0891b2;--teal-light:#ecfeff;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spinner.sm{width:18px;height:18px;border-width:2px;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-screen{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 40px;width:100%;max-width:420px;box-shadow:var(--shadow-md)}
.auth-logo{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:2px}
.auth-logo span{color:var(--blue)}
.auth-tagline{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px}
.flabel{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px}
.finput{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:var(--surface);transition:border .15s;margin-bottom:12px}
.finput:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.finput{resize:vertical;min-height:64px;margin-bottom:0}
.finput.nb{margin-bottom:0}
.auth-btn{width:100%;padding:11px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
.auth-btn.primary{background:var(--blue);color:#fff}.auth-btn.primary:hover{background:#1d4ed8}
.msg{font-size:12px;padding:8px 10px;border-radius:var(--radius);margin-bottom:10px;display:none}
.msg.err{background:var(--red-light);color:#b91c1c}.msg.ok{background:var(--green-light);color:#15803d}
.app{display:none;flex-direction:column;min-height:100vh}
.topnav{background:#0f172a;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:300}
.brand{font-size:15px;font-weight:800;letter-spacing:-.4px;color:#fff;white-space:nowrap;line-height:1.2}
.brand span{color:#60a5fa}
.brand-tag{font-size:8px;color:#64748b;letter-spacing:.04em;text-transform:uppercase}
.nav-center{display:flex;align-items:center;gap:2px;flex:1;margin:0 14px;overflow:visible}
.nav-tab{padding:6px 11px;border-radius:var(--radius);font-size:12px;font-weight:500;color:#94a3b8;cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap}
.nav-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-tab.active{background:rgba(96,165,250,.2);color:#60a5fa;font-weight:600}
/* Dropdown inside nav */
.nav-dd{position:relative;display:inline-block}
.nav-dd-btn{padding:6px 11px;border-radius:var(--radius);font-size:12px;font-weight:500;color:#94a3b8;cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.nav-dd-btn:hover,.nav-dd-btn.open{background:rgba(255,255,255,.1);color:#fff}
.nav-dd-btn.active{background:rgba(96,165,250,.2);color:#60a5fa;font-weight:600}
.nav-dd-arrow{font-size:9px;transition:transform .2s}
.nav-dd-btn.open .nav-dd-arrow{transform:rotate(180deg)}
.nav-dd-panel{position:absolute;top:calc(100% + 6px);left:0;background:#1e293b;border:1px solid #334155;border-radius:var(--radius-lg);min-width:170px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.3);overflow:hidden;display:none}
.nav-dd-panel.open{display:block}
.nav-dd-item{padding:10px 16px;font-size:13px;color:#cbd5e1;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.nav-dd-item:hover{background:#334155;color:#fff}
.nav-dd-item.active{color:#60a5fa;font-weight:600;background:rgba(96,165,250,.1)}
.nav-dd-item:not(:last-child){border-bottom:1px solid #334155}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sync-dot.busy{background:#eab308;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.08);font-size:12px;font-weight:600;color:#e2e8f0}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:10px;font-weight:700;flex-shrink:0;width:26px;height:26px}
.av.g{background:#dcfce7;color:#15803d}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg)}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.primary:hover{background:#1d4ed8}
.btn.warning{background:#f59e0b;color:#fff;border-color:#f59e0b}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.edit{color:var(--blue);border-color:var(--blue-mid);background:var(--blue-light)}
.btn.del{color:var(--red);border-color:var(--red-mid);background:var(--red-light)}
.btn.approve{color:var(--green);border-color:var(--green-mid);background:var(--green-light)}
.main{flex:1;padding:20px 22px;max-width:1400px;margin:0 auto;width:100%}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.page-title{font-size:19px;font-weight:800;letter-spacing:-.4px}
.date-nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nav-arrow{width:30px;height:30px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.nav-arrow:hover{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.metrics-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:13px 14px;box-shadow:var(--shadow)}
.mc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.mc-val{font-size:26px;font-weight:800;line-height:1}
.mc-blue .mc-label,.mc-blue .mc-val{color:var(--blue)}.mc-green .mc-label,.mc-green .mc-val{color:var(--green)}
.mc-yellow .mc-label,.mc-yellow .mc-val{color:var(--yellow)}.mc-red .mc-label,.mc-red .mc-val{color:var(--red)}
.mc-black .mc-label{color:var(--text3)}.mc-black .mc-val{color:var(--text)}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.prog-bar{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .4s}
.prog-label{font-size:12px;font-weight:700;color:var(--text2);min-width:34px;text-align:right}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-radius:var(--radius);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sh-blue{background:var(--blue-light);color:#1d4ed8}.sh-green{background:var(--green-light);color:#15803d}
.sh-yellow{background:var(--yellow-light);color:#92400e}.sh-red{background:var(--red-light);color:#b91c1c}
.sh-purple{background:var(--purple-light);color:var(--purple)}.sh-orange{background:var(--orange-light);color:var(--orange)}
.sh-teal{background:var(--teal-light);color:var(--teal)}.sh-gray{background:#f1f5f9;color:#475569}
.tbl-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.tbl-wrap table{width:100%;border-collapse:collapse}
.tbl-wrap thead th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);border-bottom:1px solid var(--border)}
.tbl-wrap tbody td{padding:10px 12px;border-bottom:1px solid #f1f3f5;vertical-align:middle;font-size:13px}
.tbl-wrap tbody tr:last-child td{border-bottom:none}.tbl-wrap tbody tr:hover td{background:#f8fafc}
.tbl-wrap tbody tr.overdue-row td{background:#fff8f8}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer}
.sb-p{background:var(--red-light);color:#b91c1c;border:1px solid var(--red-mid)}
.sb-o{background:var(--yellow-light);color:#92400e;border:1px solid var(--yellow-mid)}
.sb-d{background:var(--green-light);color:#15803d;border:1px solid var(--green-mid)}
.sb-ne{background:var(--teal-light);color:var(--teal);border:1px solid #a5f3fc}
.sb-esc{background:var(--orange-light);color:var(--orange);border:1px solid #fed7aa}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd-p{background:var(--red)}.sd-o{background:var(--yellow)}.sd-d{background:var(--green)}.sd-ne{background:var(--teal)}.sd-esc{background:var(--orange)}
.tt-wrap{position:relative;display:inline-block}
.tt-box{display:none;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;border-radius:var(--radius);padding:10px 14px;font-size:12px;min-width:200px;z-index:999;line-height:1.7;box-shadow:var(--shadow-md)}
.tt-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1f2937}
.tt-wrap:hover .tt-box{display:block}
.freq-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.fc-daily{background:var(--blue-light);color:#1d4ed8}.fc-weekly{background:var(--purple-light);color:var(--purple)}
.fc-monthly{background:var(--green-light);color:var(--green)}.fc-quarterly{background:var(--orange-light);color:var(--orange)}
.fc-eom{background:#fdf4ff;color:#9333ea}.fc-occasional{background:#fff7ed;color:#c2410c}.fc-other{background:#f1f5f9;color:#475569}
.dl-chip{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:2px 8px;font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.dl-chip.overdue{background:var(--red-light);border-color:var(--red-mid);color:var(--red)}
.panel{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h3{font-size:14px;font-weight:700;margin-bottom:14px}
.fg{display:grid;gap:10px;margin-bottom:10px}.fg2{grid-template-columns:1fr 1fr}.fg3{grid-template-columns:1fr 1fr 1fr}.fg4{grid-template-columns:1fr 1fr 1fr 1fr}
.mselect-wrap{border:1px solid var(--border);border-radius:var(--radius);padding:7px;min-height:40px;background:var(--surface);display:flex;flex-wrap:wrap;gap:4px;align-items:flex-start;cursor:text}
.mselect-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.m-chip{display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);border:1px solid var(--blue-mid);color:#1d4ed8;border-radius:20px;padding:2px 8px;font-size:12px;font-weight:500}
.m-chip .rm{cursor:pointer;color:#93c5fd;margin-left:2px;font-size:13px}.m-chip .rm:hover{color:var(--red)}
.mdrop{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);max-height:200px;overflow-y:auto;margin-top:4px;box-shadow:var(--shadow-md)}
.mdrop-item{padding:7px 10px;font-size:13px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:7px}
.mdrop-item:hover{background:var(--bg)}.mdrop-item.sel{background:var(--blue-light);color:var(--blue)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(17,24,39,.6);z-index:500;align-items:flex-start;justify-content:center;padding:50px 16px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:22px;width:100%;max-width:560px;box-shadow:var(--shadow-md);position:relative}
.modal.wide{max-width:720px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:15px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg)}
.ne-box{background:var(--teal-light);border:1px solid #a5f3fc;border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.ext-request-card{background:var(--teal-light);border:1px solid #a5f3fc;border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.incident-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.incident-card.High{border-left:3px solid var(--red)}.incident-card.Medium{border-left:3px solid var(--yellow)}.incident-card.Low{border-left:3px solid var(--green)}
.ack-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.ack-chip.Acknowledged{background:var(--green-light);color:var(--green)}
.ack-chip.Declined{background:var(--red-light);color:var(--red)}
.ack-chip.Appealed{background:var(--yellow-light);color:var(--yellow)}
.ack-chip.Pending{background:#f1f5f9;color:#475569}
.cal-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.cal-title{font-size:14px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)}
.cal-dh{text-align:center;padding:7px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);background:#f8fafc;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.cal-cell{min-height:80px;padding:5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cal-cell:hover{background:var(--blue-light)}.cal-cell.today{background:#eff6ff}.cal-cell.other-m{background:#f8fafc;opacity:.5}
.cal-cell.sel{background:var(--blue-light);outline:2px solid var(--blue);outline-offset:-2px}
.cal-date{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:2px;display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .cal-date{background:var(--blue);color:#fff}
.cal-entry{padding:1px 4px;font-size:9px;font-weight:600;border-radius:0 3px 3px 0;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border-left:2px solid}
.cal-entry.personal{background:var(--green-light);border-left-color:var(--green);color:#15803d}
.cal-entry.reminder{background:var(--yellow-light);border-left-color:var(--yellow);color:#92400e}
.cal-entry.task{background:var(--purple-light);border-left-color:var(--purple);color:var(--purple)}
.cal-entry.assigned{background:var(--blue-light);border-left-color:var(--blue);color:#1d4ed8}
.bc-bar{background:#1e3a5f;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.notif-banner{position:fixed;top:0;left:0;right:0;z-index:9999;background:#0f172a;color:#fff;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow-md);transform:translateY(-100%);transition:transform .3s}
.notif-banner.show{transform:translateY(0)}
.esc-banner{background:var(--orange-light);border:1px solid #fed7aa;border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.role-badge{padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;background:var(--purple-light);color:var(--purple)}
.admin-badge{background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700}
.toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:#fff;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty-state{text-align:center;padding:36px;color:var(--text4);font-size:13px}
.form-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
/* Compact rate bar */
.rate-bar-wrap{min-width:90px}
.rate-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:2px}
.rate-bar-fill{height:100%;border-radius:3px;transition:width .4s}
@media(max-width:900px){.metrics-row{grid-template-columns:repeat(2,1fr)}.fg2,.fg3,.fg4{grid-template-columns:1fr}.main{padding:12px}.topnav{padding:0 12px}}

/* Live Trackers */
.lt-layout{display:flex;gap:0;min-height:600px}
.lt-sidebar{width:260px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow)}
.lt-sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);background:#f8fafc}
.lt-sidebar-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
.lt-search{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text);background:var(--surface)}
.lt-search:focus{outline:none;border-color:var(--blue)}
.lt-cat-list{flex:1;overflow-y:auto;padding:8px}
.lt-cat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text4);padding:8px 8px 4px}
.lt-tracker-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:all .15s;margin-bottom:2px}
.lt-tracker-item:hover{background:var(--bg)}.lt-tracker-item.active{background:var(--blue-light)}
.lt-tracker-icon{width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--bg)}
.lt-tracker-name{font-size:13px;font-weight:500;color:var(--text2)}.lt-tracker-item.active .lt-tracker-name{color:var(--blue);font-weight:600}
.lt-tracker-meta{font-size:10px;color:var(--text4)}
.lt-linked{font-size:9px;background:var(--orange-light);color:var(--orange);padding:1px 5px;border-radius:20px;font-weight:700;display:inline-block}
.lt-content{flex:1;overflow:hidden;display:flex;flex-direction:column;margin-left:14px;min-width:0}
.lt-content-inner{flex:1;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
/* AO Table */
.ao-table{border-collapse:collapse;font-size:12px;min-width:100%}
.ao-table th{padding:6px 8px;background:#f8fafc;border:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);white-space:nowrap;text-align:center}
.ao-table th.left{text-align:left}

// Firebase
const fbRef=p=>FDB.ref(p);
const fbGet=async p=>{const s=await fbRef(p).get();return s.exists()?s.val():null;};
const fbSet=async(p,v)=>{setSyncing(1);await fbRef(p).set(v);setSyncing(0);};
const fbUpd=async(p,v)=>{setSyncing(1);await fbRef(p).update(v);setSyncing(0);};
const fbPush=async(p,v)=>{setSyncing(1);const r=await fbRef(p).push(v);setSyncing(0);return r.key;};
const fbDel=async p=>{setSyncing(1);await fbRef(p).remove();setSyncing(0);};
function fbListen(p,cb){const r=fbRef(p);r.on('value',s=>cb(s.exists()?s.val():null));_listeners.push(r);}
function stopListeners(){_listeners.forEach(r=>r.off('value'));_listeners=[];}
function setSyncing(v){const d=document.getElementById('sync-dot');if(d)d.classList.toggle('busy',!!v);}

// Helpers
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const ds=d=>d.toISOString().slice(0,10);
const fmtD=d=>d.toLocaleDateString('en-PH',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
const fmtM=d=>d.toLocaleDateString('en-PH',{month:'long',year:'numeric'});
const now=()=>new Date();

function isSched(t,d){
  if(!t?.freq)return false;
  const dow=d.getDay(),date=d.getDate(),m=d.getMonth();
  if(t.freq==='daily')return true;
  if(t.freq==='weekly')return parseInt(t.dow)===dow;
  if(t.freq==='monthly')return parseInt(t.dayOfMonth||1)===date;
  if(t.freq==='quarterly')return[0,3,6,9].includes(m)&&date===1;
  if(t.freq==='eom'){const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();return date===last;}
  return false;
}
function isOverdue(t,date){
  const n=now(),dds=ds(n);
  if(date!==dds)return false;
  return n.getHours()>(t.dh||17)||(n.getHours()===(t.dh||17)&&n.getMinutes()>(t.dm||0));
}

const sKey=(id,date)=>`${date}_${id}`;

// ── CORE STATUS COMPUTATION ──
// Single source of truth: member statuses drive everything
function getMemberStatuses(taskId, date){
  const raw=D.statuses[sKey(taskId,date)]||{};
  return raw.members||{};
}

function getMemberStatus(taskId, date, username){
  return getMemberStatuses(taskId,date)[username]||'Pending';
}

// Compute task-level overall from actual member statuses
function computeTaskOverall(taskId, date){
  const task=D.tasks.find(t=>t.id==taskId);
  if(!task||(task.assignees||[]).length===0) return 'Pending';
  const mems=getMemberStatuses(taskId,date);
  const vals=(task.assignees||[]).map(u=>mems[u]||'Pending');
  if(vals.every(v=>v==='Done')) return 'Done';
  if(vals.some(v=>v==='Needs Extension'&&!vals.some(x=>x!=='Done'&&x!=='Needs Extension'))) return 'Needs Extension';
  if(vals.some(v=>v==='Ongoing'||v==='Done')) return 'Ongoing';
  return 'Pending';
}

// Completion rate for a task on a date (% of assignees Done)
function taskCompletionRate(taskId, date){
  const task=D.tasks.find(t=>t.id==taskId);
  if(!task||(task.assignees||[]).length===0) return {done:0,total:0,pct:0};
  const mems=getMemberStatuses(taskId,date);
  const total=(task.assignees||[]).length;
  const done=(task.assignees||[]).filter(u=>(mems[u]||'Pending')==='Done').length;
  return {done,total,pct:total?Math.round(done/total*100):0};
}

// Overall dashboard metrics from member statuses directly
function computeDashboardMetrics(tasks, date){
  let totalAssignments=0,doneAssignments=0,ongoingAssignments=0,pendingAssignments=0;
  tasks.forEach(t=>{
    const mems=getMemberStatuses(t.id,date);
    (t.assignees||[]).forEach(u=>{
      const st=mems[u]||'Pending';
      totalAssignments++;
      if(st==='Done')doneAssignments++;
      else if(st==='Ongoing')ongoingAssignments++;
      else pendingAssignments++;
    });
  });
  // Task-level counts
  let taskDone=0,taskOngoing=0,taskPending=0;
  tasks.forEach(t=>{
    const ov=computeTaskOverall(t.id,date);
    if(ov==='Done')taskDone++;
    else if(ov==='Ongoing')taskOngoing++;
    else taskPending++;
  });
  const pct=totalAssignments?Math.round(doneAssignments/totalAssignments*100):0;
  return{totalAssignments,doneAssignments,ongoingAssignments,pendingAssignments,taskDone,taskOngoing,taskPending,pct,taskTotal:tasks.length};
}

const getMN=u=>u===ADMIN_UN?ADMIN_NAME:(D.members.find(m=>m.username===u)?.name||u);
const getRole=u=>u===ADMIN_UN?'Admin':(D.members.find(m=>m.username===u)?.role||'Member');

function sbc(s){if(s==='Done')return'sb-d';if(s==='Ongoing')return'sb-o';if(s==='Needs Extension')return'sb-ne';if(s==='Escalated')return'sb-esc';return'sb-p';}
function sdc(s){if(s==='Done')return'sd-d';if(s==='Ongoing')return'sd-o';if(s==='Needs Extension')return'sd-ne';if(s==='Escalated')return'sd-esc';return'sd-p';}

function rateBarHtml(pct){
  const col=pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';

}

function statusBadge(ov,taskId,date){
  const task=D.tasks.find(t=>t.id==taskId);
  const mems=getMemberStatuses(taskId,date);
  const byS={Pending:[],Ongoing:[],Done:[],'Needs Extension':[]};
  (task?.assignees||[]).forEach(u=>{const st=mems[u]||'Pending';if(!byS[st])byS[st]=[];byS[st].push(getMN(u));});
  const tip=Object.entries(byS).filter(([,v])=>v.length)
    .map(([k,v])=>`<div><b style="color:${k==='Done'?'#4ade80':k==='Ongoing'?'#fbbf24':k==='Needs Extension'?'#22d3ee':'#f87171'}">${k}:</b> ${v.join(', ')}</div>`).join('');
  return `<div class="tt-wrap"><span class="sbadge ${sbc(ov)}" onclick="openStatusModal(${taskId},'${date}')"><span class="sdot ${sdc(ov)}"></span>${ov}</span>${tip?`<div class="tt-box">${tip}</div>`:''}</div>`;
}

    <div class="metric-card mc-yellow"><div class="mc-label">Ongoing</div><div class="mc-val">${metrics.taskOngoing}</div></div>
    <div class="metric-card mc-red"><div class="mc-label">Pending</div><div class="mc-val">${metrics.taskPending}</div></div>
    <div class="metric-card mc-black"><div class="mc-label">Completion Rate</div><div class="mc-val">${metrics.pct}%</div></div>
  </div><div class="prog-row"><div class="prog-bar"><div class="prog-fill" style="width:${metrics.pct}%"></div></div><div class="prog-label">${metrics.pct}%</div><div style="font-size:11px;color:var(--text3)">${metrics.doneAssignments}/${metrics.totalAssignments} assignments done</div></div>`;
}

function dateSel(d,onchange="viewDate=new Date(this.value+'T00:00:00');rerender()"){

}

// Init
async function initApp(){
  try{
    const existing=await fbGet('tasks');
    if(!existing){const obj={};DEFAULT_TASKS.forEach(t=>{obj[t.id]=t;});await fbSet('tasks',obj);await fbSet('taskNextId',10);}
    const session=loadSession();
    if(session){
      if(session.isAdmin){CU=session;startApp();return;}
      const mems=await fbGet('members')||{};
      const match=Object.values(mems).find(m=>m.username===session.username&&m.approved);
      if(match){CU={...session,role:match.role};saveSession();startApp();return;}
    }
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
  }catch(e){
    document.getElementById('loading-screen').innerHTML=`<div style="color:var(--red);text-align:center;padding:24px;max-width:400px"><b>Connection failed</b><br>${e.message}</div>`;
  }
}
initApp();

async function doLogin(){
  hideMsg('login-err');
  const u=document.getElementById('login-user').value.trim().toLowerCase();
  const p=document.getElementById('login-pass').value;
  if(u===ADMIN_UN&&p===ADMIN_PW){CU={username:'admin',name:ADMIN_NAME,isAdmin:true};saveSession();startApp();return;}
  const mems=await fbGet('members')||{};
  const match=Object.values(mems).find(m=>m.username===u&&m.password===p&&m.approved);
  if(match){CU={username:match.username,name:match.name,isAdmin:false,role:match.role};saveSession();startApp();return;}
  showMsg('login-err','Incorrect username or password.');
}
function doLogout(){stopListeners();clearSession();CU=null;document.getElementById('app').style.display='none';document.getElementById('auth-screen').style.display='flex';['login-user','login-pass'].forEach(id=>document.getElementById(id).value='');viewDate=new Date();}

function startApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  buildNav();
  document.getElementById('user-chip').innerHTML=`<span class="av${CU.isAdmin?' g':''}">${ini(CU.name)}</span>${CU.name}${CU.isAdmin?'&nbsp;<span class="admin-badge">Admin</span>':isTOD()?'&nbsp;<span class="tod-badge">TOD</span>':'&nbsp;<span class="role-badge">'+(CU.role||'Member')+'</span>'}`;
  fbListen('tasks',v=>{D.tasks=v?Object.values(v).filter(Boolean):[];D._tLoaded=true;rerender();});
  fbListen('members',v=>{D.members=v?Object.values(v).filter(Boolean):[];D._mLoaded=true;rerender();});
  fbListen('statuses',v=>{D.statuses=v||{};rerender();});
  fbListen('actLog',v=>{D.actLog=v?Object.values(v).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,500):[];if(_curPage==='transactions')renderTransactions();});
  fbListen('extRequests',v=>{D.extRequests=v||{};if(_curPage==='dashboard')renderDashboard();});
  fbListen('incidents',v=>{D.incidents=v?Object.entries(v).map(([k,i])=>({...i,_key:k})).sort((a,b)=>(b.ts||0)-(a.ts||0)):[];if(_curPage==='incidents')renderIncidents();const open=D.incidents.filter(i=>i.status==='Open').length;const btn=document.getElementById('ntab-incidents');if(btn)btn.style.setProperty('--dot','block');});
  fbListen('broadcast',v=>{D.broadcast=v;if(v?.msg){const dis=localStorage.getItem('gh_bc_dis');if(dis!==String(v.ts))showBC(v);}else hideBC();});
  fbListen('calEntries',v=>{D.calEntries={};if(v)for(const[k,en]of Object.entries(v))if(en&&typeof en==='object'){D.calEntries[k]={};for(const[ek,e]of Object.entries(en))D.calEntries[k][ek]={...e,_key:ek};}if(selCalDate)renderCalDay(selCalDate);});
  fbListen('groups',v=>{D.groups=v?Object.entries(v).map(([k,g])=>({...g,_key:k})):[];});
  fbListen('trackers',v=>{D.trackers=v||{};if(_curPage==='live-trackers')renderLiveTrackers();if(_curPage==='dashboard')renderDashboard();});
  fbListen('todAttendance',v=>{D.todAttendance=v||{};if(_curPage==='tod')renderTOD();});
  // Init TOD week start (Sunday of current week)
  const _td=now();_todWeekStart=new Date(_td);_todWeekStart.setDate(_td.getDate()-_td.getDay());_todWeekStart.setHours(0,0,0,0);
  showPage(CU.isAdmin?'dashboard':isTOD()?'my-tasks':'my-tasks');
  scheduleReminders();
}

function rerender(){
  if(_curPage==='dashboard')renderDashboard();
  else if(_curPage==='tasks')renderTasks();
  else if(_curPage==='members')renderMembers();
  else if(_curPage==='my-tasks')renderMyTasks();
  else if(_curPage==='calendar')renderCalendar();
  else if(_curPage==='transactions')renderTransactions();
  else if(_curPage==='reports')renderReports();
  else if(_curPage==='incidents')renderIncidents();
  else if(_curPage==='workstation')renderWorkStation();
}
function showPage(p){
  _curPage=p;

    const el=document.getElementById('pg-'+pg);if(el)el.style.display=pg===p?'':'none';

}

// ── DASHBOARD ──
function renderDashboard(){
  const date=ds(viewDate);
  const sched=D.tasks.filter(t=>isSched(t,viewDate));
  const metrics=computeDashboardMetrics(sched,date);

  const byS={Done:[],Ongoing:[],Pending:[],'Needs Extension':[]};
  sched.forEach(t=>{const ov=computeTaskOverall(t.id,date);if(!byS[ov])byS[ov]=[];byS[ov].push(t);});

  const escalated=sched.filter(t=>{const ov=computeTaskOverall(t.id,date);return ov!=='Done'&&isOverdue(t,date);});
  let escHtml=escalated.length?`<div class="esc-banner"><span>⚠️</span><div><div style="font-weight:700;color:var(--orange);font-size:13px">${escalated.length} overdue task${escalated.length>1?'s':''}</div><div style="font-size:12px;color:var(--text3)">${escalated.map(t=>t.title).join(' · ')}</div></div></div>`:'';

  // Extension requests
  const pendingExt=Object.entries(D.extRequests).filter(([,r])=>r.status==='Pending');
  let extHtml='';
  if(pendingExt.length){
    extHtml=`<div class="section-hdr sh-teal" style="margin-top:4px">Extension Requests <span style="opacity:.7">(${pendingExt.length})</span></div>`;
    pendingExt.forEach(([k,r])=>{extHtml+=`<div class="ext-request-card"><div><div style="font-weight:700;font-size:13px">${r.taskTitle}</div><div style="font-size:12px;margin:3px 0">From <b>${r.memberName}</b> — ${r.reason}</div><div style="font-size:11px;color:var(--text3)">Proposed: ${r.proposedDate} ${r.proposedTime}</div></div><div style="display:flex;gap:6px;flex-shrink:0"><button class="btn sm approve" onclick="approveExt('${k}')">Approve</button><button class="btn sm del" onclick="declineExt('${k}')">Decline</button></div></div>`;});
  }

  const secCfg=[{k:'Pending',l:'Pending',c:'sh-red'},{k:'Ongoing',l:'Ongoing',c:'sh-yellow'},{k:'Needs Extension',l:'Needs Extension',c:'sh-teal'},{k:'Done',l:'Completed',c:'sh-green'}];
  let secs=secCfg.map(sc=>{
    const list=byS[sc.k]||[];if(!list.length)return'';
    const rows=list.map(t=>{
      const ov=computeTaskOverall(t.id,date),rate=taskCompletionRate(t.id,date),isOv=isOverdue(t,date)&&ov!=='Done';
      const mAv=(t.assignees||[]).slice(0,4).map(u=>`<span class="av" title="${getMN(u)}" style="width:20px;height:20px;font-size:8px;margin-right:-2px">${ini(getMN(u))}</span>`).join('');
      return `<tr class="${isOv?'overdue-row':''}">
        <td><div style="font-weight:600">${t.title}${isOv?'&nbsp;<span style="color:var(--red);font-size:10px;font-weight:700">OVERDUE</span>':''}</div><span class="freq-chip fc-${t.freq}">${t.freq}</span></td>
        <td><span class="dl-chip${isOv?' overdue':''}">${t.deadline||'—'}</span></td>
        <td>${mAv}${(t.assignees||[]).length>4?`<span style="font-size:11px;color:var(--text3)"> +${t.assignees.length-4}</span>`:''}${!(t.assignees||[]).length?'<span style="color:var(--text4);font-size:12px">Unassigned</span>':''}</td>
        <td>${statusBadge(ov,t.id,date)}</td>
        <td>${rateBarHtml(rate.pct)}<div style="font-size:10px;color:var(--text3)">${rate.done}/${rate.total} done</div></td>
        <td><button class="btn sm edit" onclick="openStatusModal(${t.id},'${date}')">Update</button></td>
      </tr>`;
    }).join('');
    return `<div class="section-hdr ${sc.c}">${sc.l} <span style="opacity:.7">(${list.length})</span></div><div class="tbl-wrap"><table><thead><tr><th>Task</th><th>Deadline</th><th>Assigned</th><th>Status</th><th>Completion</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }).join('');

  document.getElementById('pg-dashboard').innerHTML=`
    <div class="page-header">
      <div class="page-title">${ds(viewDate)===ds(now())?'Dashboard — Today':'Dashboard — '+fmtD(viewDate)}</div>
      <div class="date-nav">
        <button class="nav-arrow" onclick="viewDate.setDate(viewDate.getDate()-1);rerender()">&#8592;</button>
        ${dateSel(viewDate)}
        <button class="nav-arrow" onclick="viewDate.setDate(viewDate.getDate()+1);rerender()">&#8594;</button>
        <button class="btn warning" onclick="openModal('modal-broadcast')" style="margin-left:4px">Broadcast</button>
        <button class="btn sm" onclick="openRemind()">Reminders</button>
      </div>
    </div>
    ${escHtml}${extHtml}
    ${metricsHTML(metrics)}
    ${!sched.length?'<div class="empty-state">No tasks scheduled for this day.</div>':secs}
    ${buildAOWidget()}`;
}

async function approveExt(key){const r=D.extRequests[key];if(!r)return;await fbUpd(`extRequests/${key}`,{status:'Approved',reviewedBy:CU.name,reviewedAt:Date.now()});await logAct(r.taskId,r.date,CU.name,`Extension approved for ${r.memberName}. New: ${r.proposedDate} ${r.proposedTime}`,'EXT_APPROVED');toast('Extension approved');}
async function declineExt(key){const r=D.extRequests[key];if(!r)return;await fbUpd(`extRequests/${key}`,{status:'Declined',reviewedBy:CU.name,reviewedAt:Date.now()});await logAct(r.taskId,r.date,CU.name,`Extension declined for ${r.memberName}`,'EXT_DECLINED');toast('Extension declined');}

// ── TASKS ──
function renderTasks(){
  const el=document.getElementById('pg-tasks');if(!el)return;
  if(!D._tLoaded){el.innerHTML='<div class="empty-state"><div class="spinner" style="margin:0 auto 12px"></div>Loading...</div>';return;}
  const groups={daily:'Daily',weekly:'Weekly',monthly:'Monthly',quarterly:'Quarterly',eom:'End of Month',occasional:'Occasional',other:'Other'};
  let html=`<div class="page-header"><div class="page-title">Task Management</div><button class="btn primary" onclick="openTaskForm(null)">+ Add Task</button></div>`;
  let any=false;
  for(const[freq,label]of Object.entries(groups)){
    const list=D.tasks.filter(t=>t.freq===freq);if(!list.length)continue;any=true;
    const rows=list.map(t=>{
      const sc=t.freq==='weekly'?(DOW[parseInt(t.dow)]||''):t.freq==='daily'?'Every day':t.freq==='monthly'?`${t.dayOfMonth||1}st of month`:t.freq==='quarterly'?'1st of quarter':t.freq==='eom'?'Last day':'—';
      const mAv=(t.assignees||[]).slice(0,5).map(u=>`<span class="av" title="${getMN(u)}" style="width:20px;height:20px;font-size:8px;margin-right:2px">${ini(getMN(u))}</span>`).join('');
      return `<tr><td><div style="font-weight:600">${t.title}</div>${t.note?`<div style="font-size:11px;color:var(--text3)">${t.note}</div>`:''}</td>
        <td><span class="freq-chip fc-${t.freq}">${sc}</span></td>
        <td><span class="dl-chip">${t.deadline||'—'}</span></td>
        <td>${mAv}${(t.assignees||[]).length>5?`<span style="font-size:11px;color:var(--text3)">+${t.assignees.length-5}</span>`:''}${!(t.assignees||[]).length?'<span style="color:var(--text4);font-size:12px">None</span>':''}</td>
        <td style="white-space:nowrap"><button class="btn sm edit" onclick="openTaskForm(${t.id})" style="margin-right:3px">Edit</button><button class="btn sm del" onclick="delTask(${t.id})">Delete</button></td>
      </tr>`;
    }).join('');
    html+=`<div class="section-hdr sh-blue">${label} tasks <span style="opacity:.7">(${list.length})</span></div><div class="tbl-wrap"><table><thead><tr><th>Task</th><th>Schedule</th><th>Deadline</th><th>Assigned</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  if(!any)html+='<div class="empty-state">No tasks yet.</div>';
  el.innerHTML=html;
}

function applyGroup(key){if(!key)return;const g=D.groups.find(x=>x._key===key);if(!g)return;(g.members||[]).forEach(u=>{if(!_selM.includes(u))_selM.push(u);});ftChips();ftFilt();toast(`Added ${(g.members||[]).length} from "${g.name}"`);}
function ftToggle(){const f=document.getElementById('ft-freq')?.value;document.getElementById('ft-dow-g').style.display=f==='weekly'?'':'none';document.getElementById('ft-dom-g').style.display=f==='monthly'?'':'none';}
function ftChips(){const e=document.getElementById('ft-chips');if(!e)return;e.innerHTML=_selM.map(u=>`<span class="m-chip"><span class="av" style="width:17px;height:17px;font-size:7px">${ini(getMN(u))}</span>${getMN(u)}<span class="rm" onclick="ftRemM('${u}')">&#x2715;</span></span>`).join('');}
function ftRemM(u){_selM=_selM.filter(x=>x!==u);ftChips();ftFilt();}
function ftFilt(){
  const q=(document.getElementById('ft-ms')?.value||'').toLowerCase(),drop=document.getElementById('ft-mdrop');if(!drop)return;
  const f=D.members.filter(m=>m.approved&&(m.name.toLowerCase().includes(q)||m.username.toLowerCase().includes(q)));
  drop.innerHTML=f.length?f.map(m=>`<div class="mdrop-item${_selM.includes(m.username)?' sel':''}" onclick="ftTogM('${m.username}')"><span class="av" style="width:20px;height:20px;font-size:8px">${ini(m.name)}</span><span style="flex:1">${m.name}</span><span style="font-size:11px;color:var(--text3)">${m.role||'Member'}</span>${_selM.includes(m.username)?'<span style="color:var(--blue)">&#10003;</span>':''}</div>`).join(''):'<div class="mdrop-item" style="color:var(--text4)">No members found</div>';
  drop.style.display='';
}
function ftTogM(u){if(_selM.includes(u))_selM=_selM.filter(x=>x!==u);else _selM.push(u);ftChips();ftFilt();}
function ftSelAll(){_selM=D.members.filter(m=>m.approved).map(m=>m.username);ftChips();ftFilt();}
function ftClrAll(){_selM=[];ftChips();ftFilt();}
async function saveTask(){
  const title=document.getElementById('ft-title')?.value.trim();if(!title){toast('Task name required');return;}
  const freq=document.getElementById('ft-freq')?.value;
  const dow=freq==='weekly'?parseInt(document.getElementById('ft-dow')?.value):null;
  const dayOfMonth=freq==='monthly'?parseInt(document.getElementById('ft-dom')?.value||1):null;
  const data={title,freq,dow:dow??null,dayOfMonth:dayOfMonth??null,time:document.getElementById('ft-time')?.value.trim()||'5:00 PM',deadline:document.getElementById('ft-deadline')?.value.trim()||'',dh:parseInt(document.getElementById('ft-dh')?.value||17),dm:parseInt(document.getElementById('ft-dm')?.value||0),note:document.getElementById('ft-note')?.value.trim()||'',assignees:[..._selM]};
  if(_editTId){data.id=_editTId;await fbSet(`tasks/${_editTId}`,data);toast('Task updated');}
  else{const nid=(await fbGet('taskNextId'))||10;data.id=nid;await fbSet(`tasks/${nid}`,data);await fbSet('taskNextId',nid+1);toast('Task added');}
  closeModal('modal-task');
}
async function delTask(id){if(!confirm('Delete this task?'))return;await fbDel(`tasks/${id}`);toast('Task deleted');}

// ── STATUS MODAL ──
function openStatusModal(taskId,date){
  const task=D.tasks.find(t=>t.id==taskId);if(!task)return;
  document.getElementById('mst-title').textContent=task.title;

      body+=`<tr><td><div style="display:flex;align-items:center;gap:6px"><span class="av" style="width:22px;height:22px;font-size:8px">${ini(name)}</span>${name}</div></td>
        <td><span style="font-size:11px;color:var(--text3)">${role}</span></td>
        <td>${can?`<select class="finput nb" style="padding:4px 7px;font-size:12px;width:auto" onchange="smMember(${taskId},'${date}','${u}',this.value)">
          <option${mst==='Pending'?' selected':''}>Pending</option><option${mst==='Ongoing'?' selected':''}>Ongoing</option>
          <option${mst==='Needs Extension'?' selected':''}>Needs Extension</option><option${mst==='Done'?' selected':''}>Done</option>
        </select>`:`<span class="sbadge ${sbc(mst)}" style="cursor:default"><span class="sdot ${sdc(mst)}"></span>${mst}</span>`}</td>
      </tr>`;
    });
    body+='</tbody></table></div>';
    const rate=taskCompletionRate(taskId,date);
    body+=`<div style="margin:10px 0 4px;font-size:12px;color:var(--text3)">Overall completion: <b>${rate.done}/${rate.total} done (${rate.pct}%)</b></div>${rateBarHtml(rate.pct)}`;
  }
  if(CU.isAdmin){
    body+=`<div class="form-actions" style="margin-top:14px"><button class="btn success" onclick="markAllDone(${taskId},'${date}')">Mark All Done</button><button class="btn" onclick="closeModal('modal-status')">Close</button></div>`;
  } else {
    body+=`<div class="form-actions"><button class="btn" onclick="closeModal('modal-status')">Close</button></div>`;
  }
  document.getElementById('mst-body').innerHTML=body;openModal('modal-status');
}

async function smMember(tid,date,u,val){
  if(val==='Needs Extension'&&!CU.isAdmin){
    document.getElementById('mne-body').innerHTML=`
      <p style="font-size:13px;color:var(--text3);margin-bottom:12px">Provide a reason and proposed new deadline for admin review.</p>
      <div class="fg"><label class="flabel">Reason</label><textarea class="finput" id="ne-reason" rows="3" placeholder="Why do you need more time?"></textarea></div>
      <div class="fg fg2">
        <div><label class="flabel">Proposed Date</label><input class="finput nb" id="ne-date" type="date" value="${date}"/></div>
        <div><label class="flabel">Proposed Time</label><input class="finput nb" id="ne-time" placeholder="e.g. 7:00 PM"/></div>
      </div>
      <div class="form-actions"><button class="btn teal" onclick="submitExtRequest(${tid},'${date}','${u}')">Submit Request</button><button class="btn" onclick="closeModal('modal-ne')">Cancel</button></div>`;
    openModal('modal-ne');return;
  }
  const k=sKey(tid,date);
  const cur=D.statuses[k]||{};
  const mems={...(cur.members||{}),[u]:val};
  // Recompute overall from fresh member map
  const task=D.tasks.find(t=>t.id==tid);
  const vals=(task?.assignees||[]).map(x=>mems[x]||'Pending');
  let overall='Pending';
  if(vals.every(v=>v==='Done'))overall='Done';
  else if(vals.some(v=>v==='Ongoing'||v==='Done'))overall='Ongoing';
  else if(vals.some(v=>v==='Needs Extension'))overall='Needs Extension';
  await fbUpd(`statuses/${k}`,{members:mems,overall});
  await logAct(tid,date,getMN(u),val,'');
  toast('Status updated');
  // Refresh modal
  openStatusModal(tid,date);
}

async function submitExtRequest(tid,date,u){
  const reason=document.getElementById('ne-reason')?.value.trim();if(!reason){toast('Reason required');return;}
  const task=D.tasks.find(t=>t.id==tid);
  await fbPush('extRequests',{taskId:tid,taskTitle:task?.title||'',memberUsername:u,memberName:getMN(u),reason,proposedDate:document.getElementById('ne-date')?.value,proposedTime:document.getElementById('ne-time')?.value.trim(),date,status:'Pending',ts:Date.now()});
  const k=sKey(tid,date),cur=D.statuses[k]||{};
  const mems={...(cur.members||{}),[u]:'Needs Extension'};
  const task2=D.tasks.find(t=>t.id==tid);
  const vals=(task2?.assignees||[]).map(x=>mems[x]||'Pending');
  let overall='Needs Extension';
  if(vals.every(v=>v==='Done'))overall='Done';
  else if(vals.some(v=>v==='Ongoing'||v==='Done'))overall='Ongoing';
  await fbUpd(`statuses/${k}`,{members:mems,overall});
  await logAct(tid,date,getMN(u),'Needs Extension','EXT_REQUESTED');
  closeModal('modal-ne');closeModal('modal-status');
  toast('Extension request submitted!');
}

async function markAllDone(tid,date){

async function bulkImport(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'}),ws=wb.Sheets[wb.SheetNames[0]],data=XLSX.utils.sheet_to_json(ws,{header:1});
      let added=0;
      for(const row of data){
        const name=(row[0]||'').toString().trim(),user=(row[1]||'').toString().trim().toLowerCase(),pass=(row[2]||'').toString().trim(),role=(row[3]||'Member').toString().trim(),rt=(row[4]||'').toString().trim();
        if(name&&user&&pass&&user!==ADMIN_UN&&!D.members.find(m=>m.username===user)){await fbPush('members',{name,username:user,password:pass,role,reportsTo:rt,approved:true});added++;}
      }
      toast(`Imported ${added} member(s)`);
    }catch(e){toast('Could not read file');}
  };
  reader.readAsBinaryString(file);evt.target.value='';
}

function renderReports(){
  const el=document.getElementById('pg-reports');if(!el)return;
  const stats={};
  D.members.forEach(m=>{stats[m.username]={name:m.name,role:m.role||'Member',total:0,done:0,ne:0};});
  const dates=[];for(let i=0;i<30;i++){const d=new Date(now());d.setDate(now().getDate()-i);dates.push(ds(d));}
  dates.forEach(date=>{
    const d=new Date(date+'T00:00:00');
    D.tasks.forEach(t=>{
      if(!isSched(t,d))return;
      (t.assignees||[]).forEach(u=>{
        if(!stats[u])return;
        const mst=getMemberStatus(t.id,date,u);
        stats[u].total++;
        if(mst==='Done')stats[u].done++;
        if(mst==='Needs Extension')stats[u].ne++;
      });
    });
  });
  const sorted=Object.values(stats).sort((a,b)=>(b.total?b.done/b.total:0)-(a.total?a.done/a.total:0));
  const rows=sorted.map(m=>{
    const rate=m.total?Math.round(m.done/m.total*100):0;
    const col=rate>=80?'var(--green)':rate>=50?'var(--yellow)':'var(--red)';
    return `<tr><td><div style="display:flex;align-items:center;gap:7px"><span class="av" style="width:22px;height:22px;font-size:8px">${ini(m.name)}</span>${m.name}</div></td>

      <td style="text-align:center;color:var(--green);font-weight:600">${m.done}</td>
      <td style="text-align:center;color:var(--teal)">${m.ne}</td>
      <td style="text-align:center;color:var(--red)">${m.total-m.done-m.ne}</td>
      <td style="min-width:130px"><div style="display:flex;align-items:center;gap:6px"><div class="prog-bar" style="flex:1;height:6px"><div class="prog-fill" style="width:${rate}%;background:${col}"></div></div><span style="font-size:11px;font-weight:700;color:${col}">${rate}%</span></div></td>
    </tr>`;
  }).join('');
  el.innerHTML=`<div class="page-header"><div class="page-title">Compliance Report — Last 30 Days</div><button class="btn sm" onclick="exportReport()">Export Excel</button></div>
    <div class="tbl-wrap"><table><thead><tr><th>Member</th><th>Role</th><th>Total</th><th>Done</th><th>Extension</th><th>Pending</th><th>Rate</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="7" class="empty-state">No data yet</td></tr>'}</tbody></table></div>`;
}
function exportReport(){
  const rows=[];
  D.members.forEach(m=>{
    let total=0,done=0,ne=0;
    const dates=[];for(let i=0;i<30;i++){const d=new Date(now());d.setDate(now().getDate()-i);dates.push(ds(d));}
    dates.forEach(date=>{const d=new Date(date+'T00:00:00');D.tasks.forEach(t=>{if(!isSched(t,d)||!(t.assignees||[]).includes(m.username))return;const mst=getMemberStatus(t.id,date,m.username);total++;if(mst==='Done')done++;if(mst==='Needs Extension')ne++;});});
    rows.push({Name:m.name,Role:m.role||'Member',Total:total,Done:done,'Needs Extension':ne,Pending:total-done-ne,'Rate %':total?Math.round(done/total*100):0});
  });
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Report');
  XLSX.writeFile(wb,`GovernanceHub_Report_${ds(now())}.xlsx`);
}

function calKey(d){return`${CU.username}_${d}`.replace(/[.#$\/\[\]]/g,'_');}
function getCalE(d){const k=calKey(d);return D.calEntries[k]?Object.values(D.calEntries[k]):[];}
function getExpandedCalE(d){
  const direct=getCalE(d),dDate=new Date(d+'T00:00:00'),recurring=[];
  for(const[,en]of Object.entries(D.calEntries)){if(!en)continue;for(const[,e]of Object.entries(en)){if(!e.recur||e.recur==='none')continue;const orig=new Date((e.originDate||'2000-01-01')+'T00:00:00');if(orig>=dDate||ds(orig)===d)continue;let match=e.recur==='daily'||(e.recur==='weekly'&&dDate.getDay()===orig.getDay())||(e.recur==='monthly'&&dDate.getDate()===orig.getDate());if(match)recurring.push({...e,_recurring:true});}}
  return[...direct,...recurring];
}
function renderCalendar(){
  const y=calViewDate.getFullYear(),m=calViewDate.getMonth();
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),tds=ds(now());
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cal-cell other-m"></div>`;
  for(let d=1;d<=dim;d++){const dd=new Date(y,m,d),dds=ds(dd),isT=dds===tds,isSel=selCalDate===dds;const entries=getExpandedCalE(dds);const myA=D.tasks.filter(t=>(t.assignees||[]).includes(CU.username)&&isSched(t,dd));const eh=[...myA.slice(0,1).map(t=>`<div class="cal-entry assigned">${t.title}</div>`),...entries.slice(0,2).map(e=>`<div class="cal-entry ${e.type||'personal'}">${e.title}</div>`)].join('');cells+=`<div class="cal-cell${isT?' today':''}${isSel?' sel':''}" onclick="calSel('${dds}')"><span class="cal-date">${d}</span>${eh}</div>`;}
  document.getElementById('pg-calendar').innerHTML=`
    <div class="page-header"><div class="page-title">My Calendar</div><button class="btn primary" onclick="openCalEntry(selCalDate||'${tds}')">+ Add Entry</button></div>
    <div class="cal-wrap" style="margin-bottom:16px"><div class="cal-header"><button class="btn sm" onclick="calViewDate.setMonth(calViewDate.getMonth()-1);renderCalendar()">&#8592;</button><div class="cal-title">${fmtM(calViewDate)}</div><button class="btn sm" onclick="calViewDate.setMonth(calViewDate.getMonth()+1);renderCalendar()">&#8594;</button></div><div class="cal-grid">${DOW.map(d=>`<div class="cal-dh">${d}</div>`).join('')}${cells}</div></div>
    <div id="cal-day-panel">${selCalDate?calDayHTML(selCalDate):'<div class="panel"><div class="empty-state" style="padding:16px">Click any date to view or add entries</div></div>'}</div>`;
}
function calDayHTML(dds){
  const d=new Date(dds+'T00:00:00'),entries=getExpandedCalE(dds);
  const myA=D.tasks.filter(t=>(t.assignees||[]).includes(CU.username)&&isSched(t,d));
  const taskRows=myA.map(t=>{const mst=getMemberStatus(t.id,dds,CU.username);return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-weight:600;font-size:13px">${t.title}</div><span class="dl-chip" style="font-size:11px">${t.deadline||''}</span></div><span class="sbadge ${sbc(mst)}" style="cursor:default"><span class="sdot ${sdc(mst)}"></span>${mst}</span></div>`;}).join('');
  const personalRows=entries.map(e=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-weight:600;font-size:13px">${e.title}${e._recurring?' <span style="font-size:10px;color:var(--text3)">(recurring)</span>':''}</div>${e.note?`<div style="font-size:11px;color:var(--text3)">${e.note}</div>`:''}</div><div style="display:flex;align-items:center;gap:5px"><span class="cal-entry ${e.type||'personal'}" style="margin:0">${e.type||'personal'}</span>${e.recur&&e.recur!=='none'?`<span style="font-size:10px;background:var(--purple-light);color:var(--purple);padding:1px 5px;border-radius:20px;font-weight:600">${e.recur}</span>`:''}${!e._recurring?`<button class="btn sm del" onclick="calRemE('${e.originDate||dds}','${e._key}')">&#x2715;</button>`:''}</div></div>`).join('');
  return `<div class="panel"><h3>${fmtD(d)} <button class="btn sm primary" onclick="openCalEntry('${dds}')" style="float:right">+ Add</button></h3>${myA.length?`<div style="margin-bottom:12px"><div class="section-hdr sh-purple" style="margin-bottom:6px">Assigned Tasks</div>${taskRows}</div>`:''}
    <div class="section-hdr sh-blue" style="margin-bottom:6px">Personal Entries</div>${personalRows||'<div style="color:var(--text4);font-size:13px;padding:8px 0">No entries yet.</div>'}
  </div>`;
}

function buildWSTable(sheetName){
  const sheet = WS.sheets[sheetName];
  if(!sheet) return '';
  const {headers, rows} = sheet;
  const hCells = headers.map((h,ci) =>
    `<th style="min-width:110px;padding:6px 8px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);background:#f8fafc;border:1px solid var(--border);white-space:nowrap;position:relative">
      <span contenteditable="true" class="ws-cell-edit" onblur="wsUpdateHeader('${sheetName}',${ci},this.innerText)">${h||''}</span>
      <span class="ws-col-del" onclick="wsDeleteCol('${sheetName}',${ci})">&#x2715;</span>
    </th>`
  ).join('');

  const bodyRows = rows.map((row,ri) => {
    const cells = headers.map((_,ci) =>
      `<td style="padding:5px 8px;border:1px solid var(--border);font-size:12px;min-width:110px">
        <span contenteditable="true" class="ws-cell-edit" onblur="wsUpdateCell('${sheetName}',${ri},${ci},this.innerText)">${row[ci]===null||row[ci]===undefined?'':row[ci]}</span>
      </td>`
    ).join('');
    return `<tr>
      <td style="padding:4px 6px;border:1px solid var(--border);background:#f8fafc;font-size:11px;color:var(--text3);text-align:center;user-select:none">${ri+1}</td>
      ${cells}
      <td style="padding:4px 6px;border:1px solid var(--border);background:#f8fafc;text-align:center">
        <span style="cursor:pointer;color:var(--red);font-size:12px" onclick="wsDeleteRow('${sheetName}',${ri})">&#x2715;</span>
      </td>
    </tr>`;
  }).join('');

  return `<table style="border-collapse:collapse;font-size:13px;min-width:100%">
    <thead><tr>
      <th style="padding:6px 8px;background:#f8fafc;border:1px solid var(--border);color:var(--text3);font-size:11px;min-width:36px">#</th>
      ${hCells}
      <th style="padding:6px 8px;background:#f8fafc;border:1px solid var(--border);min-width:36px"></th>
    </tr></thead>
    <tbody>${bodyRows}</tbody>
  </table>`;
}

function wsAddSheet(){

  WS.sheets[name]={headers:['Column 1','Column 2','Column 3'],rows:[['','','']]};

function wsImport(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      WS.sheets={};
      wb.SheetNames.forEach(name=>{
        const ws=wb.Sheets[name];
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(!raw.length){WS.sheets[name]={headers:[],rows:[]};return;}
        // First two rows are headers (date row + Order/Product row) — merge them
        const r0=raw[0]||[];const r1=raw[1]||[];
        let headers=[];
        let maxCol=Math.max(r0.length,r1.length);
        for(let i=0;i<maxCol;i++){
          const top=r0[i]?String(r0[i]):'';
          const bot=r1[i]?String(r1[i]):'';
          if(top&&bot)headers.push(top+' '+bot);
          else if(top)headers.push(top);
          else if(bot)headers.push(bot);
          else headers.push('');
        }
        const rows=raw.slice(2).map(row=>{
          const r=[];for(let i=0;i<maxCol;i++)r.push(row[i]===undefined?'':row[i]);return r;
        });
        WS.sheets[name]={headers,rows};
      });
      WS.activeSheet=wb.SheetNames[0]||null;
      wsSave();
      // Auto-sync to dashboard
      wsSyncToDashboard();
      renderWorkStation();
      toast(`Imported ${wb.SheetNames.length} sheet(s) — ${wb.SheetNames.join(', ')}`);
    }catch(err){toast('Could not read file: '+err.message);}
  };
  reader.readAsBinaryString(file);
  evt.target.value='';
}

function wsUpdateHeader(sheet,ci,val){
  if(!WS.sheets[sheet])return;
  WS.sheets[sheet].headers[ci]=val;wsSave();
}
function wsUpdateCell(sheet,ri,ci,val){
  if(!WS.sheets[sheet])return;
  WS.sheets[sheet].rows[ri][ci]=val;wsSave();
}
function wsAddRow(){
  if(!WS.activeSheet||!WS.sheets[WS.activeSheet])return;
  const cols=WS.sheets[WS.activeSheet].headers.length;
  WS.sheets[WS.activeSheet].rows.push(Array(cols).fill(''));
  wsSave();
  const area=document.getElementById('ws-table-area');
  if(area)area.innerHTML=buildWSTable(WS.activeSheet);
}
function wsAddCol(){
  if(!WS.activeSheet||!WS.sheets[WS.activeSheet])return;
  const sh=WS.sheets[WS.activeSheet];
  sh.headers.push('New Column');
  sh.rows.forEach(r=>r.push(''));
  wsSave();
  const area=document.getElementById('ws-table-area');
  if(area)area.innerHTML=buildWSTable(WS.activeSheet);
}
function wsDeleteRow(sheet,ri){
  if(!WS.sheets[sheet])return;
  WS.sheets[sheet].rows.splice(ri,1);wsSave();
  const area=document.getElementById('ws-table-area');
  if(area)area.innerHTML=buildWSTable(WS.activeSheet);
}
function wsDeleteCol(sheet,ci){
  if(!WS.sheets[sheet])return;
  WS.sheets[sheet].headers.splice(ci,1);
  WS.sheets[sheet].rows.forEach(r=>r.splice(ci,1));
  wsSave();
  const area=document.getElementById('ws-table-area');
  if(area)area.innerHTML=buildWSTable(WS.activeSheet);
}

function wsExport(){
  if(!Object.keys(WS.sheets).length){toast('No data to export');return;}
  const wb=XLSX.utils.book_new();
  Object.entries(WS.sheets).forEach(([name,sh])=>{
    const data=[sh.headers,...sh.rows];
    const ws=XLSX.utils.aoa_to_sheet(data);
    XLSX.utils.book_append_sheet(wb,ws,name);
  });
  XLSX.writeFile(wb,`GovernanceHub_WorkStation_${ds(now())}.xlsx`);
  toast('Exported!');
}

function wsSyncToDashboard(){
  // Map sheet data to D.aoData for the AO dashboard widget
  // Each region sheet: rows have CDM name in col 2, then date/value pairs
  // We store { regionKey: [{cdm, date: value, ...}] }
  D.aoData={};
  const today=ds(now());
  REGIONS.forEach(r=>{
    const sh=WS.sheets[r.key];
    if(!sh){D.aoData[r.key]=[];return;}
    const headers=sh.headers;
    // Find date columns — headers that look like a date
    const dateCols=[];
    headers.forEach((h,i)=>{if(/\d{2}\/\d{2}\/\d{4}/.test(h)||/\d{4}-\d{2}-\d{2}/.test(h))dateCols.push({idx:i,date:h});});

    D.aoData[r.key]=sh.rows.filter(row=>row[0]&&String(row[0]).trim()&&String(row[0]).trim()!=='TOTAL').map(row=>{
      const obj={brand:row[0],platform:row[1],cdm:row[2],lead:row[3]};
      // Find today's column value — check if any date header matches today
      headers.forEach((h,i)=>{
        // h might be "04/20/2026 Order" style
        const dp=h.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if(dp){const d=`${dp[3]}-${dp[1]}-${dp[2]}`;obj[d]=row[i];}
      });
      return obj;
    });
  });
  if(_curPage==='dashboard')renderDashboard();
  toast('Synced to Dashboard AO widget');
}

          <div style="font-size:11px;font-weight:600;color:var(--green)">IN ${new Date(rec.timeIn).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'})}</div>
          ${rec.timeOut?`<div style="font-size:11px;font-weight:600;color:var(--red)">OUT ${new Date(rec.timeOut).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'})}</div><div style="font-size:10px;color:var(--text3)">${hrs}h</div>`:'<div style="font-size:10px;color:var(--yellow)">No logout</div>'}

        </div>`;

        inner=`<button class="tod-btn-in" onclick="todLogIn('${m.username}','${dds}')">Log In</button>`;

      return`<td style="text-align:center;vertical-align:middle;background:${isT?'#fffbeb':''}">${inner}</td>`;
    }).join('');
    let totalH=0,daysP=0;
    dates.forEach(d=>{const rec=(att[m.username]||{})[ds(d)]||{};if(rec.timeIn&&rec.timeOut){totalH+=(new Date(rec.timeOut)-new Date(rec.timeIn))/3600000;daysP++;}});

      <tbody>${rows||'<tr><td colspan="9" class="empty-state">No TOD members.</td></tr>'}</tbody>
    </table>
  </div>`;
}

function exportTOD(){
  const dates=todWeekDates(),att=D.todAttendance||{};
  const todMems=D.members.filter(m=>m.role==='Talent on Demand'&&m.approved);
  const rows=[];
  todMems.forEach(m=>{
    const row={Name:m.name};let totalH=0;
    dates.forEach(d=>{
      const dds=ds(d),rec=(att[m.username]||{})[dds]||{};
      row[DOW[d.getDay()]+' In']=rec.timeIn?new Date(rec.timeIn).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}):'';
      row[DOW[d.getDay()]+' Out']=rec.timeOut?new Date(rec.timeOut).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}):'';
      const h=rec.timeIn&&rec.timeOut?((new Date(rec.timeOut)-new Date(rec.timeIn))/3600000).toFixed(1):'';
      row[DOW[d.getDay()]+' Hrs']=h;if(h)totalH+=parseFloat(h);
    });
    row['Total Hrs']=totalH.toFixed(1);rows.push(row);
  });
  const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'TOD');
  XLSX.writeFile(wb,`TOD_${ds(_todWeekStart)}.xlsx`);toast('Exported!');
}

  `).join('');
  const hasActive=_activeTracker&&D.trackers[_activeTracker];
  const contentArea=hasActive?buildTrackerContent(_activeTracker):`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:14px">\u{1F4CA}</div><div style="font-weight:700;font-size:16px;margin-bottom:6px">Select a tracker from the sidebar</div><div style="color:var(--text3);font-size:13px;margin-bottom:20px">Or upload a new Excel file to create your first tracker.</div><button class="btn primary" onclick="openAddTracker()">Upload Tracker</button></div>`;
  el.innerHTML=`<div class="page-header"><div class="page-title">Live Trackers</div><button class="btn primary" onclick="openAddTracker()">+ Upload Tracker</button></div>
    <div style="display:flex;gap:0;min-height:600px">
      <div style="width:260px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow)">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);background:#f8fafc">
          <div style="font-size:13px;font-weight:700;margin-bottom:8px">My Trackers (${trackers.length})</div>
          <input id="lt-search-val" placeholder="Search trackers..." oninput="renderLiveTrackers()" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--surface)" value="${q}"/>
        </div>
        <div style="flex:1;overflow-y:auto;padding:8px">
          ${trackers.length?sideItems:'<div style="padding:20px;text-align:center;color:var(--text4);font-size:12px">No trackers yet.<br/>Upload your first Excel file.</div>'}
        </div>
      </div>
      <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;margin-left:14px;min-width:0">
        ${hasActive?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <div style="font-size:15px;font-weight:700;flex:1">${D.trackers[_activeTracker].name}</div>
          ${!D.trackers[_activeTracker].aoLinked?`<button class="btn sm warning" onclick="ltLinkDash('${_activeTracker}')">\uD83D\uDCCE Link to Dashboard</button>`:`<span style="font-size:11px;background:var(--orange-light);color:var(--orange);padding:3px 10px;border-radius:20px;font-weight:700">\uD83D\uDCCE Dashboard Linked</span>`}
          <button class="btn sm" onclick="ltExport('${_activeTracker}')">Export Excel</button>
          <button class="btn sm del" onclick="ltDelete('${_activeTracker}')">Delete</button>
        </div>`:''}
        <div style="flex:1;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)">${contentArea}</div>
      </div>
    </div>`;
}

function ltSelect(key){_activeTracker=key;const t=D.trackers[key];_activeTrackerSheet=t?.sheets?Object.keys(t.sheets)[0]:null;renderLiveTrackers();}

function buildTrackerContent(key){
  const t=D.trackers[key];if(!t)return'';
  const sheets=t.sheets||{};const names=Object.keys(sheets);
  if(!names.length)return'<div class="empty-state">No sheets.</div>';
  if(!_activeTrackerSheet||!sheets[_activeTrackerSheet])_activeTrackerSheet=names[0];
  const tabs=names.map(n=>`<div style="padding:7px 14px;font-size:12px;font-weight:${n===_activeTrackerSheet?'700':'500'};color:${n===_activeTrackerSheet?'var(--blue)':'var(--text3)'};border-bottom:2px solid ${n===_activeTrackerSheet?'var(--blue)':'transparent'};cursor:pointer;white-space:nowrap;transition:all .15s" onclick="ltSetSheet('${key}','${n}')">${n}</div>`).join('');
  return`<div style="border-bottom:1px solid var(--border);display:flex;gap:0;overflow-x:auto">${tabs}</div><div style="overflow:auto;padding:12px">${buildAOTable(key,_activeTrackerSheet,sheets[_activeTrackerSheet])}</div>`;
}

function ltSetSheet(key,sheet){_activeTrackerSheet=sheet;renderLiveTrackers();}

function buildAOTable(trackerKey,sheetKey,sheet){
  if(!sheet)return'<div class="empty-state">Empty sheet.</div>';
  const{row0,row1,rows}=sheet;
  if(!row0||!row0.length)return'<div class="empty-state">No data. The sheet may be empty.</div>';
  const maxCol=Math.max((row0||[]).length,(row1||[]).length);
  const nowT=now();
  // Build two-row header: row0 has dates spanning 2 cols, row1 has Order/Product
  let hR1='<tr><th style="text-align:left;min-width:120px;padding:6px 8px;background:#f8fafc;border:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3)">Brand</th><th style="text-align:left;min-width:80px;padding:6px 8px;background:#f8fafc;border:1px solid var(--border);font-size:10px;color:var(--text3)">Platform</th><th style="text-align:left;min-width:100px;padding:6px 8px;background:#f8fafc;border:1px solid var(--border);font-size:10px;color:var(--text3)">CDM</th><th style="text-align:left;min-width:100px;padding:6px 8px;background:#f8fafc;border:1px solid var(--border);font-size:10px;color:var(--text3)">Team Lead</th>';
  let hR2='<tr><th style="border:1px solid var(--border)"></th><th style="border:1px solid var(--border)"></th><th style="border:1px solid var(--border)"></th><th style="border:1px solid var(--border)"></th>';
  const dateCols=[];
  for(let ci=4;ci<maxCol;ci+=2){
    const h0=row0[ci]!=null?String(row0[ci]):'';
    const h1a=row1&&row1[ci]!=null?String(row1[ci]):'Order';
    const h1b=row1&&row1[ci+1]!=null?String(row1[ci+1]):'Product';
    let pastDue=false;
    const dp=h0.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(dp){const cd=new Date(parseInt(dp[3]),parseInt(dp[1])-1,parseInt(dp[2]));cd.setHours(12,0,0,0);if(nowT>cd)pastDue=true;}
    const bg=pastDue?'#fff5f5':'#f8fafc';const fg=pastDue?'var(--red)':'var(--text3)';
    hR1+=`<th colspan="2" style="text-align:center;padding:6px 8px;background:${bg};border:1px solid var(--border);border-left:2px solid var(--blue-mid);font-size:10px;font-weight:700;color:${fg};white-space:nowrap">${h0}</th>`;
    hR2+=`<th style="padding:5px 6px;background:#f8fafc;border:1px solid var(--border);border-left:2px solid var(--blue-mid);font-size:10px;font-weight:700;color:var(--text3);min-width:65px;text-align:center">${h1a}</th><th style="padding:5px 6px;background:#f8fafc;border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text3);min-width:65px;text-align:center">${h1b}</th>`;
    dateCols.push({ci,h0,pastDue});
  }
  hR1+='</tr>';hR2+='</tr>';
  const dataRows=rows||[];
  const isTR=r=>String(r&&r[3]||'').toUpperCase()==='TOTAL';
  const bRows=dataRows.map((row,ri)=>{
    if(!row)return'';
    const isT=isTR(row);
    const fixBg=isT?'background:#f8fafc':'';
    let cells=`<td style="padding:5px 8px;border:1px solid var(--border);font-weight:${isT?'700':''};${fixBg};text-align:left">${row[0]===null||row[0]===undefined?'':row[0]}</td><td style="padding:5px 8px;border:1px solid var(--border);${fixBg};text-align:left">${row[1]===null||row[1]===undefined?'':row[1]}</td><td style="padding:5px 8px;border:1px solid var(--border);${fixBg};text-align:left">${row[2]===null||row[2]===undefined?'':row[2]}</td><td style="padding:5px 8px;border:1px solid var(--border);font-weight:${isT?'700':''};${fixBg};text-align:left">${row[3]===null||row[3]===undefined?'':row[3]}</td>`;
    dateCols.forEach(({ci,pastDue})=>{
      [ci,ci+1].forEach(c=>{
        const v=row[c];const vS=v===null||v===undefined?'':String(v);
        const isOFF=vS.toUpperCase()==='OFF';
        const filled=vS!==''&&!isOFF;
        const cls=isOFF?'off':filled?'filled':pastDue?'overdue':'';
        const ts=(sheet.timestamps||{})[`${ri}_${c}`]||'';
        const bl=c===ci?'border-left:2px solid var(--blue-mid);':'';
        if(isT){
          cells+=`<td style="padding:5px 8px;border:1px solid var(--border);${bl}font-weight:700;background:#f8fafc;text-align:center">${vS}</td>`;
        } else {
          cells+=`<td style="padding:3px 4px;border:1px solid var(--border);${bl}text-align:center">
            <input type="text" style="width:58px;padding:3px 5px;border:1px solid transparent;border-radius:4px;font-size:12px;text-align:center;background:${cls==='overdue'?'var(--red-light)':cls==='filled'?'var(--green-light)':cls==='off'?'#f1f5f9':'transparent'};color:${cls==='overdue'?'var(--red)':cls==='filled'?'var(--green)':cls==='off'?'var(--text4)':'var(--text)'}" value="${vS}" placeholder="${isOFF?'OFF':'0'}" onchange="ltUpdateCell('${trackerKey}','${sheetKey}',${ri},${c},this.value)" onfocus="this.select()"/>
            ${ts?`<span style="font-size:9px;color:var(--text4);display:block;line-height:1;margin-top:1px">${ts}</span>`:''}
          </td>`;
        }
      });
    });
    return`<tr>${cells}</tr>`;
  }).join('');
  return`<table style="border-collapse:collapse;font-size:12px;min-width:100%"><thead>${hR1}${hR2}</thead><tbody>${bRows}</tbody></table>`;
}

async function ltUpdateCell(trackerKey,sheetKey,ri,ci,val){
  const ts=now().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
  const path=`trackers/${trackerKey}/sheets/${sheetKey}`;
  const parsed=val===''?null:(isNaN(val)?val:parseFloat(val));
  await fbSet(`${path}/rows/${ri}/${ci}`,parsed);
  await fbSet(`${path}/timestamps/${ri}_${ci}`,ts);
  const sheet=D.trackers[trackerKey]?.sheets?.[sheetKey];
  if(sheet){
    const rows=sheet.rows||[];const lastIdx=rows.length-1;
    if(lastIdx>=0&&String(rows[lastIdx]&&rows[lastIdx][3]||'').toUpperCase()==='TOTAL'){
      let total=0;
      for(let r=0;r<lastIdx;r++){const v=rows[r]?rows[r][ci]:null;const n=parseFloat(String(v||'').replace(/[^0-9.]/g,''));if(!isNaN(n))total+=n;}
      await fbSet(`${path}/rows/${lastIdx}/${ci}`,total);
    }
  }
  if(D.trackers[trackerKey]?.aoLinked&&_curPage==='dashboard')renderDashboard();
}

function openAddTracker(){
  document.getElementById('mlt-body').innerHTML=`
    <div class="fg fg2">
      <div><label class="flabel">Tracker Name</label><input class="finput nb" id="lt-name" placeholder="e.g. AO Tracker Week 17"/></div>
      <div><label class="flabel">Category</label><select class="finput nb" id="lt-cat">${LT_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
    </div>
    <div style="border:2px dashed var(--border);border-radius:var(--radius-lg);padding:28px;text-align:center;cursor:pointer;transition:border .15s" onclick="document.getElementById('lt-file').click()" id="lt-dz">
      <div style="font-size:28px;margin-bottom:8px">\uD83D\uDCC1</div>
      <div style="font-weight:600;font-size:14px;margin-bottom:4px">Click to select Excel file</div>
      <div style="font-size:12px;color:var(--text3)">.xlsx or .xls supported</div>
      <input type="file" id="lt-file" accept=".xlsx,.xls" style="display:none" onchange="ltPreviewFile(event)"/>
    </div>
    <div id="lt-preview" style="margin-top:10px"></div>
    <div class="form-actions"><button class="btn primary" id="lt-save-btn" onclick="ltSave()" style="display:none">Save Tracker</button><button class="btn" onclick="closeModal('modal-lt-upload')">Cancel</button></div>`;
  openModal('modal-lt-upload');
}

let _ltParsed=null;
function ltPreviewFile(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      _ltParsed={};
      wb.SheetNames.forEach(name=>{
        const ws=wb.Sheets[name];
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        if(!raw.length){_ltParsed[name]={row0:[],row1:[],rows:[],timestamps:{}};return;}
        _ltParsed[name]={row0:raw[0]||[],row1:raw[1]||[],rows:raw.slice(2),timestamps:{}};
      });
      document.getElementById('lt-preview').innerHTML=`<div style="background:var(--green-light);border:1px solid var(--green-mid);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--green)">\u2713 Parsed ${wb.SheetNames.length} sheet(s): ${wb.SheetNames.join(', ')}</div>`;
      document.getElementById('lt-save-btn').style.display='';
    }catch(err){document.getElementById('lt-preview').innerHTML=`<div style="color:var(--red);font-size:13px">Error: ${err.message}</div>`;}
  };
  reader.readAsBinaryString(file);
}

async function ltSave(){
  const name=document.getElementById('lt-name')?.value.trim();if(!name){toast('Name required');return;}
  if(!_ltParsed){toast('Upload a file first');return;}
  const cat=document.getElementById('lt-cat')?.value||'Other';
  const key=await fbPush('trackers',{name,category:cat,sheets:_ltParsed,uploadedAt:Date.now(),uploadedBy:CU.name,aoLinked:false});
  closeModal('modal-lt-upload');_ltParsed=null;_activeTracker=key;
  _activeTrackerSheet=Object.keys(_ltParsed||{})[0]||null;
  toast(`Tracker "${name}" saved!`);
}

async function ltLinkDash(key){
  const updates={};
  Object.keys(D.trackers||{}).forEach(k=>{updates[`trackers/${k}/aoLinked`]=k===key;});
  await fbUpd('',updates);toast('Linked to Dashboard AO widget!');
}
async function ltDelete(key){
  if(!confirm('Delete this tracker? Cannot be undone.'))return;
  await fbDel(`trackers/${key}`);
  if(_activeTracker===key){_activeTracker=null;_activeTrackerSheet=null;}
  toast('Tracker deleted');
}
function ltExport(key){
  const t=D.trackers[key];if(!t)return;
  const wb=XLSX.utils.book_new();
  Object.entries(t.sheets||{}).forEach(([name,sh])=>{
    const data=[];
    if(sh.row0)data.push(sh.row0);
    if(sh.row1)data.push(sh.row1);
    (sh.rows||[]).forEach(r=>data.push(r||[]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data),name);
  });
  XLSX.writeFile(wb,`${t.name}_${ds(now())}.xlsx`);toast('Exported!');
}

// AO completion from linked tracker
function getAOCompletionForDashboard(){
  const linked=Object.values(D.trackers||{}).find(t=>t.aoLinked);
  if(!linked)return null;
  const today=ds(now());
  const AO_R=[{key:'MY'},{key:'PH'},{key:'SG'},{key:'TH'},{key:'VN'}];
  const results={};
  AO_R.forEach(r=>{
    const sh=linked.sheets?.[r.key];
    if(!sh){results[r.key]={done:0,total:0,pct:0};return;}
    const dataRows=(sh.rows||[]).filter(row=>row&&row[0]!=null&&String(row[0]).trim()&&String(row[0]).toUpperCase()!=='TOTAL');
    const total=dataRows.length;
    if(!total){results[r.key]={done:0,total:0,pct:0};return;}
    const row0=sh.row0||[];
    const todayCols=[];
    row0.forEach((h,ci)=>{
      if(!h)return;
      const dp=String(h).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if(dp){
        const d=`${dp[3]}-${dp[1].padStart(2,'0')}-${dp[2].padStart(2,'0')}`;
        if(d===today){todayCols.push(ci);if(ci+1<row0.length)todayCols.push(ci+1);}
      }
    });
    if(!todayCols.length){results[r.key]={done:0,total,pct:0};return;}
    // ANY input (even 0) counts — only blank/null = not done
    const done=dataRows.filter(row=>todayCols.some(ci=>{
      const v=row[ci];
      return v!==null&&v!==undefined&&String(v).trim()!==''&&String(v).toUpperCase()!=='OFF';
    })).length;
    results[r.key]={done,total,pct:Math.round(done/total*100)};
  });
  return results;
}

// Close dropdowns on outside click
document.addEventListener('click',e=>{
  const dd=document.getElementById('nav-dd-data');if(dd&&!dd.contains(e.target))closeNavDD();
  ['ft-mdrop','grp-mdrop','inc-tag-drop'].forEach(id=>{const d=document.getElementById(id);if(d&&!d.contains(e.target)){const s=document.getElementById(id==='ft-mdrop'?'ft-ms':id==='grp-mdrop'?'grp-ms':'inc-tag-ms');if(s&&!s.contains(e.target))d.style.display='none';}});
});
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');}));
</script>
