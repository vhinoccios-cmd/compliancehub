<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GovernanceHub</title>
<style>
:root{
  --bg:#f4f6f9;--surface:#fff;--border:#e2e6ea;
  --text:#1a1d23;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --blue:#2563eb;--blue-light:#eff6ff;--blue-mid:#bfdbfe;
  --green:#16a34a;--green-light:#f0fdf4;--green-mid:#bbf7d0;
  --yellow:#ca8a04;--yellow-light:#fefce8;--yellow-mid:#fde68a;
  --red:#dc2626;--red-light:#fef2f2;--red-mid:#fecaca;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --orange:#ea580c;--orange-light:#fff7ed;
  --teal:#0891b2;--teal-light:#ecfeff;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spinner.sm{width:18px;height:18px;border-width:2px;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-screen{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 40px;width:100%;max-width:420px;box-shadow:var(--shadow-md)}
.auth-logo{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:2px}
.auth-logo span{color:var(--blue)}
.auth-tagline{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px}
.flabel{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px}
.finput{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:var(--surface);transition:border .15s;margin-bottom:12px}
.finput:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.finput{resize:vertical;min-height:64px;margin-bottom:0}
.finput.nb{margin-bottom:0}
.auth-btn{width:100%;padding:11px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
.auth-btn.primary{background:var(--blue);color:#fff}.auth-btn.primary:hover{background:#1d4ed8}
.msg{font-size:12px;padding:8px 10px;border-radius:var(--radius);margin-bottom:10px;display:none}
.msg.err{background:var(--red-light);color:#b91c1c}.msg.ok{background:var(--green-light);color:#15803d}
.app{display:none;flex-direction:column;min-height:100vh}
.topnav{background:#0f172a;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:300}
.brand{font-size:16px;font-weight:800;letter-spacing:-.4px;color:#fff;white-space:nowrap}
.brand span{color:#60a5fa}
.brand-tag{font-size:9px;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;display:block;margin-top:-2px}
.nav-center{display:flex;gap:2px;flex:1;margin:0 14px;overflow-x:auto}
.nav-tab{padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;color:#94a3b8;cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap}
.nav-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-tab.active{background:rgba(96,165,250,.2);color:#60a5fa;font-weight:600}
.nav-tab.alert::after{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;background:var(--red);border-radius:50%}
.nav-tab{position:relative}
.nav-dropdown{position:relative;display:inline-block}
.nav-dropdown-btn{padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;color:#94a3b8;cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.nav-dropdown-btn:hover,.nav-dropdown-btn.active{background:rgba(255,255,255,.1);color:#fff}
.nav-dropdown-btn.active{background:rgba(96,165,250,.2);color:#60a5fa;font-weight:600}
.nav-dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;background:#1e293b;border:1px solid #334155;border-radius:var(--radius);min-width:160px;z-index:400;box-shadow:var(--shadow-md);display:none}
.nav-dropdown-menu.open{display:block}
.nav-dropdown-item{padding:9px 14px;font-size:13px;color:#94a3b8;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-dropdown-item:hover{background:#334155;color:#fff}
.nav-dropdown-item.active{color:#60a5fa;font-weight:600}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-indicator{display:flex;align-items:center;gap:4px;font-size:11px;color:#94a3b8}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.sync-dot.busy{background:#eab308;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.1);font-size:12px;font-weight:600;color:#e2e8f0}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:10px;font-weight:700;flex-shrink:0;width:26px;height:26px}
.av.g{background:#dcfce7;color:#15803d}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg)}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.primary:hover{background:#1d4ed8}
.btn.warning{background:#f59e0b;color:#fff;border-color:#f59e0b}.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}.btn.teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn.sm{padding:4px 10px;font-size:12px}.btn.edit{color:var(--blue);border-color:var(--blue-mid);background:var(--blue-light)}
.btn.del{color:var(--red);border-color:var(--red-mid);background:var(--red-light)}
.btn.approve{color:var(--green);border-color:var(--green-mid);background:var(--green-light)}
.main{flex:1;padding:20px 22px;max-width:1400px;margin:0 auto;width:100%}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.page-title{font-size:19px;font-weight:800;letter-spacing:-.4px}
.date-nav{display:flex;align-items:center;gap:6px}
.nav-arrow{width:30px;height:30px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.nav-arrow:hover{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.metrics-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:13px 14px;box-shadow:var(--shadow)}
.mc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.mc-val{font-size:26px;font-weight:800;line-height:1}
.mc-blue .mc-label,.mc-blue .mc-val{color:var(--blue)}.mc-green .mc-label,.mc-green .mc-val{color:var(--green)}
.mc-yellow .mc-label,.mc-yellow .mc-val{color:var(--yellow)}.mc-red .mc-label,.mc-red .mc-val{color:var(--red)}
.mc-black .mc-label{color:var(--text3)}.mc-black .mc-val{color:var(--text)}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.prog-bar{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .4s}
.prog-label{font-size:12px;font-weight:700;color:var(--text2);min-width:34px;text-align:right}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-radius:var(--radius);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sh-blue{background:var(--blue-light);color:#1d4ed8}.sh-green{background:var(--green-light);color:#15803d}
.sh-yellow{background:var(--yellow-light);color:#92400e}.sh-red{background:var(--red-light);color:#b91c1c}
.sh-purple{background:var(--purple-light);color:var(--purple)}.sh-orange{background:var(--orange-light);color:var(--orange)}
.sh-teal{background:var(--teal-light);color:var(--teal)}.sh-gray{background:#f1f5f9;color:#475569}
.tbl-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.tbl-wrap table{width:100%;border-collapse:collapse}
.tbl-wrap thead th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);border-bottom:1px solid var(--border)}
.tbl-wrap tbody td{padding:10px 12px;border-bottom:1px solid #f1f3f5;vertical-align:middle;font-size:13px}
.tbl-wrap tbody tr:last-child td{border-bottom:none}.tbl-wrap tbody tr:hover td{background:#f8fafc}
.tbl-wrap tbody tr.overdue-row td{background:#fff8f8}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer}
.sb-p{background:var(--red-light);color:#b91c1c;border:1px solid var(--red-mid)}
.sb-o{background:var(--yellow-light);color:#92400e;border:1px solid var(--yellow-mid)}
.sb-d{background:var(--green-light);color:#15803d;border:1px solid var(--green-mid)}
.sb-ne{background:var(--teal-light);color:var(--teal);border:1px solid #a5f3fc}
.sb-esc{background:var(--orange-light);color:var(--orange);border:1px solid #fed7aa}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd-p{background:var(--red)}.sd-o{background:var(--yellow)}.sd-d{background:var(--green)}.sd-ne{background:var(--teal)}.sd-esc{background:var(--orange)}
.tt-wrap{position:relative;display:inline-block}
.tt-box{display:none;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;border-radius:var(--radius);padding:10px 14px;font-size:12px;min-width:200px;z-index:999;line-height:1.7;box-shadow:var(--shadow-md)}
.tt-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1f2937}
.tt-wrap:hover .tt-box{display:block}
.freq-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.fc-daily{background:var(--blue-light);color:#1d4ed8}.fc-weekly{background:var(--purple-light);color:var(--purple)}
.fc-monthly{background:var(--green-light);color:var(--green)}.fc-quarterly{background:var(--orange-light);color:var(--orange)}
.fc-eom{background:#fdf4ff;color:#9333ea}.fc-occasional{background:#fff7ed;color:#c2410c}.fc-other{background:#f1f5f9;color:#475569}
.dl-chip{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:2px 8px;font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.dl-chip.overdue{background:var(--red-light);border-color:var(--red-mid);color:var(--red)}
.panel{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h3{font-size:14px;font-weight:700;margin-bottom:14px}
.fg{display:grid;gap:10px;margin-bottom:10px}.fg2{grid-template-columns:1fr 1fr}.fg3{grid-template-columns:1fr 1fr 1fr}.fg4{grid-template-columns:1fr 1fr 1fr 1fr}
.mselect-wrap{border:1px solid var(--border);border-radius:var(--radius);padding:7px;min-height:40px;background:var(--surface);display:flex;flex-wrap:wrap;gap:4px;align-items:flex-start;cursor:text}
.mselect-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.m-chip{display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);border:1px solid var(--blue-mid);color:#1d4ed8;border-radius:20px;padding:2px 8px;font-size:12px;font-weight:500}
.m-chip .rm{cursor:pointer;color:#93c5fd;margin-left:2px;font-size:13px}.m-chip .rm:hover{color:var(--red)}
.mdrop{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);max-height:200px;overflow-y:auto;margin-top:4px;box-shadow:var(--shadow-md)}
.mdrop-item{padding:7px 10px;font-size:13px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:7px}
.mdrop-item:hover{background:var(--bg)}.mdrop-item.sel{background:var(--blue-light);color:var(--blue)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(17,24,39,.6);z-index:500;align-items:flex-start;justify-content:center;padding:50px 16px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:22px;width:100%;max-width:560px;box-shadow:var(--shadow-md);position:relative}
.modal.wide{max-width:720px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:15px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg)}
.ne-box{background:var(--teal-light);border:1px solid #a5f3fc;border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.ne-box .ne-title{font-weight:700;color:var(--teal);font-size:13px;margin-bottom:4px}
.ne-box .ne-detail{font-size:12px;color:var(--text2)}
.ext-request-card{background:var(--teal-light);border:1px solid #a5f3fc;border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.incident-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.incident-card.High{border-left:3px solid var(--red)}.incident-card.Medium{border-left:3px solid var(--yellow)}.incident-card.Low{border-left:3px solid var(--green)}
.ack-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;gap:4px}
.ack-chip.Acknowledged{background:var(--green-light);color:var(--green)}
.ack-chip.Declined{background:var(--red-light);color:var(--red)}
.ack-chip.Appealed{background:var(--yellow-light);color:var(--yellow)}
.ack-chip.Pending{background:#f1f5f9;color:#475569}
.cal-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.cal-title{font-size:14px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)}
.cal-dh{text-align:center;padding:7px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);background:#f8fafc;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.cal-cell{min-height:80px;padding:5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cal-cell:hover{background:var(--blue-light)}.cal-cell.today{background:#eff6ff}.cal-cell.other-m{background:#f8fafc;opacity:.5}
.cal-cell.sel{background:var(--blue-light);outline:2px solid var(--blue);outline-offset:-2px}
.cal-date{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:2px;display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .cal-date{background:var(--blue);color:#fff}
.cal-entry{padding:1px 4px;font-size:9px;font-weight:600;border-radius:0 3px 3px 0;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border-left:2px solid}
.cal-entry.personal{background:var(--green-light);border-left-color:var(--green);color:#15803d}
.cal-entry.reminder{background:var(--yellow-light);border-left-color:var(--yellow);color:#92400e}
.cal-entry.task{background:var(--purple-light);border-left-color:var(--purple);color:var(--purple)}
.cal-entry.assigned{background:var(--blue-light);border-left-color:var(--blue);color:#1d4ed8}
.bc-bar{background:#1e3a5f;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.notif-banner{position:fixed;top:0;left:0;right:0;z-index:9999;background:#0f172a;color:#fff;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow-md);transform:translateY(-100%);transition:transform .3s}
.notif-banner.show{transform:translateY(0)}
.esc-banner{background:var(--orange-light);border:1px solid #fed7aa;border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.role-badge{padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;background:var(--purple-light);color:var(--purple)}
.admin-badge{background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700}
.toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:#fff;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty-state{text-align:center;padding:36px;color:var(--text4);font-size:13px}
.form-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.divider{height:1px;background:var(--border);margin:14px 0}
@media(max-width:900px){.metrics-row{grid-template-columns:repeat(2,1fr)}.fg2,.fg3,.fg4{grid-template-columns:1fr}.main{padding:12px}.topnav{padding:0 12px}}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text3)">Connecting to GovernanceHub...</div>
</div>

<div class="notif-banner" id="notif-banner">
  <div><div style="font-weight:700;font-size:14px" id="nb-title"></div><div style="font-size:12px;opacity:.85" id="nb-body"></div></div>
  <div style="cursor:pointer;font-size:18px;opacity:.7;padding:4px 8px" onclick="document.getElementById('notif-banner').classList.remove('show')">&#x2715;</div>
</div>

<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Governance<span>Hub</span></div>
    <div class="auth-tagline">Clarity &middot; Control &middot; Accountability</div>
    <label class="flabel">Username</label>
    <input class="finput" id="login-user" placeholder="Your username" autocomplete="username"/>
    <label class="flabel">Password</label>
    <input class="finput" id="login-pass" type="password" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="msg err" id="login-err">Incorrect username or password.</div>
    <button class="auth-btn primary" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div class="app" id="app">
  <div class="bc-bar" id="bc-bar" style="display:none">
    <div><div style="font-size:13px;font-weight:500" id="bc-msg"></div><div style="font-size:11px;opacity:.7" id="bc-time"></div></div>
    <button class="btn sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="dismissBC()">Dismiss</button>
  </div>
  <nav class="topnav">
    <div>
      <div class="brand">Governance<span>Hub</span></div>
      <div class="brand-tag">Clarity &middot; Control &middot; Accountability</div>
    </div>
    <div class="nav-center" id="nav-center"></div>
    <div class="nav-right">
      <div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div>Live</div>
      <div class="user-chip" id="user-chip"></div>
      <button class="btn sm" onclick="doLogout()" style="background:rgba(255,255,255,.1);color:#e2e8f0;border-color:rgba(255,255,255,.2)">Sign Out</button>
    </div>
  </nav>
  <div class="main">
    <div id="pg-dashboard"></div>
    <div id="pg-tasks" style="display:none"></div>
    <div id="pg-members" style="display:none"></div>

const fbPush=async(p,v)=>{setSyncing(1);const r=await fbRef(p).push(v);setSyncing(0);return r.key;};

function isSched(t,d){
  if(!t?.freq)return false;
  const dow=d.getDay(),date=d.getDate(),m=d.getMonth();
  if(t.freq==='daily')return true;
  if(t.freq==='weekly')return parseInt(t.dow)===dow;
  if(t.freq==='monthly')return parseInt(t.dayOfMonth||1)===date;
  if(t.freq==='quarterly')return [0,3,6,9].includes(m)&&date===1;
  if(t.freq==='eom'){const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();return date===last;}
  return false;
}
function isOverdue(t,date){
  const n=now(),dds=ds(n);
  if(date!==dds)return false;
  return n.getHours()>(t.dh||17)||(n.getHours()===(t.dh||17)&&n.getMinutes()>(t.dm||0));
}

const sKey=(id,date)=>`${date}_${id}`;
const getSt=(id,date)=>D.statuses[sKey(id,date)]||{overall:'Pending',remarks:'',members:{},memberRemarks:{}};

// Correct overall from member statuses
function computeOverall(members, assignees){
  const vals=(assignees||[]).map(u=>members[u]||'Pending');
  if(!vals.length)return 'Pending';
  if(vals.every(v=>v==='Done'))return 'Done';
  if(vals.every(v=>v==='Needs Extension'))return 'Needs Extension';
  if(vals.some(v=>v==='Ongoing'||v==='Done'||v==='Needs Extension'))return 'Ongoing';
  return 'Pending';
}

function getOv(id,date){
  const st=D.statuses[sKey(id,date)];
  if(!st)return 'Pending';
  // Always recompute from members for accuracy
  const task=D.tasks.find(t=>t.id==id);
  if(task&&st.members&&Object.keys(st.members).length){
    return computeOverall(st.members,task.assignees);
  }
  return st.overall||'Pending';
}

const getMN=u=>u===ADMIN_UN?ADMIN_NAME:(D.members.find(m=>m.username===u)?.name||u);
const getRole=u=>u===ADMIN_UN?'Admin':(D.members.find(m=>m.username===u)?.role||'Member');

function sbc(s){
  if(s==='Done')return'sb-d';
  if(s==='Ongoing')return'sb-o';
  if(s==='Needs Extension')return'sb-ne';
  if(s==='Escalated')return'sb-esc';
  return'sb-p';
}
function sdc(s){
  if(s==='Done')return'sd-d';
  if(s==='Ongoing')return'sd-o';
  if(s==='Needs Extension')return'sd-ne';
  if(s==='Escalated')return'sd-esc';
  return'sd-p';
}

  const tip=Object.entries(byS).filter(([,v])=>v.length)

async function initApp(){

    const existing=await fbGet('tasks');
    if(!existing){const obj={};DEFAULT_TASKS.forEach(t=>{obj[t.id]=t;});await fbSet('tasks',obj);await fbSet('taskNextId',10);}
    const session=loadSession();
    if(session){
      if(session.isAdmin){CU=session;startApp();return;}
      const mems=await fbGet('members')||{};
      const match=Object.values(mems).find(m=>m.username===session.username&&m.approved);
      if(match){CU={...session,role:match.role};saveSession();startApp();return;}
    }
    document.getElementById('loading-screen').style.display='none';

  fbListen('extRequests',v=>{D.extRequests=v||{};rerender();checkExtNotif();});

// ═══ DASHBOARD ═══
function renderDashboard(){
  const date=ds(viewDate);
  const sched=D.tasks.filter(t=>isSched(t,viewDate));
  const byS={Done:[],Ongoing:[],Pending:[],'Needs Extension':[]};
  sched.forEach(t=>{const s=getOv(t.id,date);if(!byS[s])byS[s]=[];byS[s].push(t);});

  const escalated=sched.filter(t=>{const s=getOv(t.id,date);return s!=='Done'&&isOverdue(t,date);});
  let escHtml=escalated.length?`<div class="esc-banner"><span style="font-size:18px">⚠️</span><div><div style="font-weight:700;color:var(--orange);font-size:13px">${escalated.length} overdue task${escalated.length>1?'s':''}</div><div style="font-size:12px;color:var(--text3)">${escalated.map(t=>t.title).join(' · ')}</div></div></div>`:'';

  // Extension requests pending
  const pendingExt=Object.entries(D.extRequests).filter(([,r])=>r.status==='Pending');
  let extHtml='';
  if(pendingExt.length){
    extHtml=`<div class="section-hdr sh-teal">Extension Requests <span style="opacity:.7">(${pendingExt.length} pending)</span></div>`;
    pendingExt.forEach(([k,r])=>{
      extHtml+=`<div class="ext-request-card">
        <div>
          <div style="font-weight:700;font-size:13px">${r.taskTitle}</div>
          <div style="font-size:12px;color:var(--text2);margin:3px 0">From: <b>${r.memberName}</b> &mdash; ${r.reason}</div>
          <div style="font-size:11px;color:var(--text3)">Proposed: ${r.proposedDate} ${r.proposedTime}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn sm approve" onclick="approveExt('${k}')">Approve</button>
          <button class="btn sm del" onclick="declineExt('${k}')">Decline</button>
        </div>
      </div>`;
    });
  }

  const secCfg=[{k:'Pending',l:'Pending',c:'sh-red'},{k:'Ongoing',l:'Ongoing',c:'sh-yellow'},{k:'Needs Extension',l:'Needs Extension',c:'sh-teal'},{k:'Done',l:'Completed',c:'sh-green'}];
  let secs=secCfg.map(sc=>{
    const list=byS[sc.k]||[];if(!list.length)return'';
    const rows=list.map(t=>{
      const st=getOv(t.id,date),info=getSt(t.id,date),ov=isOverdue(t,date)&&st!=='Done';
      const mAv=(t.assignees||[]).slice(0,4).map(u=>`<span class="av" title="${getMN(u)}" style="width:20px;height:20px;font-size:8px;margin-right:-2px">${ini(getMN(u))}</span>`).join('');
      return `<tr class="${ov?'overdue-row':''}">
        <td><div style="font-weight:600">${t.title}${ov?'&nbsp;<span style="color:var(--red);font-size:10px;font-weight:700">OVERDUE</span>':''}</div><span class="freq-chip fc-${t.freq}">${t.freq}</span></td>
        <td><span class="dl-chip${ov?' overdue':''}">${t.deadline||'—'}</span></td>
        <td>${mAv}${(t.assignees||[]).length>4?`<span style="font-size:11px;color:var(--text3)"> +${t.assignees.length-4}</span>`:''}${!(t.assignees||[]).length?'<span style="color:var(--text4);font-size:12px">Unassigned</span>':''}</td>
        <td>${statusBadge(st,t.id,date)}</td>
        <td style="font-size:12px;color:var(--text3);max-width:160px">${info.remarks||'—'}</td>
        <td><button class="btn sm edit" onclick="openStatusModal(${t.id},'${date}')">Update</button></td>
      </tr>`;
    }).join('');
    return `<div class="section-hdr ${sc.c}">${sc.l} <span style="opacity:.7">(${list.length})</span></div><div class="tbl-wrap"><table><thead><tr><th>Task</th><th>Deadline</th><th>Assigned</th><th>Status</th><th>Remarks</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }).join('');

  document.getElementById('pg-dashboard').innerHTML=`
    <div class="page-header">
      <div class="page-title">${ds(viewDate)===ds(now())?'Dashboard — Today':'Dashboard — '+fmtD(viewDate)}</div>
      <div class="date-nav">
        <button class="nav-arrow" onclick="viewDate.setDate(viewDate.getDate()-1);rerender()">&#8592;</button>
        ${dateSel(viewDate)}
        <button class="nav-arrow" onclick="viewDate.setDate(viewDate.getDate()+1);rerender()">&#8594;</button>
        <button class="btn sm" onclick="openRemind()" style="margin-left:4px">Reminders</button>
      </div>
    </div>
    ${escHtml}${extHtml}
    ${metricsHTML(date,sched)}
    ${!sched.length?'<div class="empty-state">No tasks scheduled for this day.</div>':secs}`;
}

// Extension approval
async function approveExt(key){
  const r=D.extRequests[key];if(!r)return;
  await fbUpd(`extRequests/${key}`,{status:'Approved',reviewedBy:CU.name,reviewedAt:Date.now()});
  // Update the task deadline display for that date
  await logAct(r.taskId,r.date,CU.name,`Approved extension for ${r.memberName}. New deadline: ${r.proposedDate} ${r.proposedTime}`,'EXT_APPROVED');
  toast('Extension approved');
}
async function declineExt(key){
  const r=D.extRequests[key];if(!r)return;
  await fbUpd(`extRequests/${key}`,{status:'Declined',reviewedBy:CU.name,reviewedAt:Date.now()});
  await logAct(r.taskId,r.date,CU.name,`Declined extension request from ${r.memberName}`,'EXT_DECLINED');
  toast('Extension declined');
}

// ═══ TASKS ═══
function renderTasks(){
  const el=document.getElementById('pg-tasks');if(!el)return;
  if(!D._tLoaded){el.innerHTML='<div class="empty-state"><div class="spinner" style="margin:0 auto 12px"></div>Loading tasks...</div>';return;}
  const groups={daily:'Daily',weekly:'Weekly',monthly:'Monthly',quarterly:'Quarterly',eom:'End of Month',occasional:'Occasional',other:'Other'};
  let html=`<div class="page-header"><div class="page-title">Task Management</div><button class="btn primary" onclick="openTaskForm(null)">+ Add Task</button></div>`;
  let any=false;
  for(const[freq,label]of Object.entries(groups)){
    const list=D.tasks.filter(t=>t.freq===freq);if(!list.length)continue;any=true;
    const rows=list.map(t=>{
      const sc=t.freq==='weekly'?(DOW[parseInt(t.dow)]||''):t.freq==='daily'?'Every day':t.freq==='monthly'?`${t.dayOfMonth||1}${['th','st','nd','rd'][Math.min((t.dayOfMonth||1)%10,3)]||'th'} of month`:t.freq==='quarterly'?'1st of quarter':t.freq==='eom'?'Last day of month':'—';
      const mAv=(t.assignees||[]).slice(0,5).map(u=>`<span class="av" title="${getMN(u)}" style="width:20px;height:20px;font-size:8px;margin-right:2px">${ini(getMN(u))}</span>`).join('');
      return `<tr><td><div style="font-weight:600">${t.title}</div>${t.note?`<div style="font-size:11px;color:var(--text3)">${t.note}</div>`:''}</td>
        <td><span class="freq-chip fc-${t.freq}">${sc}</span></td>
        <td><span class="dl-chip">${t.deadline||'—'}</span></td>
        <td>${mAv}${(t.assignees||[]).length>5?`<span style="font-size:11px;color:var(--text3)">+${t.assignees.length-5}</span>`:''}${!(t.assignees||[]).length?'<span style="color:var(--text4);font-size:12px">None</span>':''}</td>
        <td style="white-space:nowrap"><button class="btn sm edit" onclick="openTaskForm(${t.id})" style="margin-right:3px">Edit</button><button class="btn sm del" onclick="delTask(${t.id})">Delete</button></td>
      </tr>`;
    }).join('');
    html+=`<div class="section-hdr sh-blue">${label} tasks <span style="opacity:.7">(${list.length})</span></div><div class="tbl-wrap"><table><thead><tr><th>Task</th><th>Schedule</th><th>Deadline</th><th>Assigned Members</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  if(!any)html+='<div class="empty-state">No tasks yet. Click "+ Add Task" to create one.</div>';
  el.innerHTML=html;
}

    <div class="fg fg2">
      <div><label class="flabel">Task Name</label><input class="finput nb" id="ft-title" value="${t?t.title:''}"/></div>
      <div><label class="flabel">Frequency</label><select class="finput nb" id="ft-freq" onchange="ftToggle()">

      </select></div>
    </div>

      <div id="ft-dow-g" style="display:none"><label class="flabel">Day of Week</label><select class="finput nb" id="ft-dow">${dOpts}</select></div>
      <div id="ft-dom-g" style="display:none"><label class="flabel">Day of Month</label><input class="finput nb" id="ft-dom" type="number" min="1" max="28" value="${t?.dayOfMonth||1}"/></div>

      <div><label class="flabel">Deadline Label</label><input class="finput nb" id="ft-deadline" value="${t?.deadline||''}"/></div>
    </div>

      <div><label class="flabel">Deadline Hour (0-23)</label><input class="finput nb" id="ft-dh" type="number" min="0" max="23" value="${t?.dh??17}"/></div>

    </div>
    <div class="fg"><label class="flabel">Notes</label><textarea class="finput" id="ft-note">${t?.note||''}</textarea></div>
    ${D.groups.length?`<div class="fg"><label class="flabel">Quick Assign Group</label><select class="finput nb" id="ft-group" onchange="applyGroup(this.value)"><option value="">— Select a group to add —</option>${groupOpts}</select></div>`:''}

      <label class="flabel">Assign Members &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">${D.members.filter(m=>m.approved).length} available</span></label>
      <div class="mselect-wrap" id="ft-chips" onclick="document.getElementById('ft-ms').focus()"></div>
      <input class="finput" id="ft-ms" placeholder="Search by name or username..." style="margin-top:6px;margin-bottom:4px" oninput="ftFilt()" onfocus="document.getElementById('ft-mdrop').style.display=''"/>
      <div style="display:flex;gap:6px;margin-bottom:6px">
        <button class="btn sm" onclick="ftSelAll()">Select All</button>
        <button class="btn sm" onclick="ftClrAll()">Clear All</button>

function applyGroup(val){
  if(!val||!val.startsWith('group:'))return;
  const key=val.replace('group:','');
  const g=D.groups.find(x=>x._key===key);
  if(!g)return;
  (g.members||[]).forEach(u=>{if(!_selM.includes(u))_selM.push(u);});
  ftChips();ftFilt();
  document.getElementById('ft-group').value='';
  toast(`Added ${(g.members||[]).length} members from group "${g.name}"`);
}

function ftToggle(){
  const f=document.getElementById('ft-freq')?.value;
  document.getElementById('ft-dow-g').style.display=f==='weekly'?'':'none';
  document.getElementById('ft-dom-g').style.display=f==='monthly'?'':'none';
}
function ftChips(){const e=document.getElementById('ft-chips');if(!e)return;e.innerHTML=_selM.map(u=>`<span class="m-chip"><span class="av" style="width:17px;height:17px;font-size:7px">${ini(getMN(u))}</span>${getMN(u)}<span class="rm" onclick="ftRemM('${u}')">&#x2715;</span></span>`).join('');}
function ftRemM(u){_selM=_selM.filter(x=>x!==u);ftChips();ftFilt();}
function ftFilt(){
  const q=(document.getElementById('ft-ms')?.value||'').toLowerCase(),drop=document.getElementById('ft-mdrop');if(!drop)return;
  const approved=D.members.filter(m=>m.approved);
  const f=q?approved.filter(m=>m.name.toLowerCase().includes(q)||m.username.toLowerCase().includes(q)):approved;
  drop.innerHTML=f.length?f.map(m=>`<div class="mdrop-item${_selM.includes(m.username)?' sel':''}" onclick="ftTogM('${m.username}')">
    <span class="av" style="width:20px;height:20px;font-size:8px">${ini(m.name)}</span>
    <span style="flex:1">${m.name}</span>
    <span style="color:var(--text3);font-size:11px">${m.role||'Member'}</span>
    ${_selM.includes(m.username)?'<span style="color:var(--blue)">&#10003;</span>':''}
  </div>`).join(''):'<div class="mdrop-item" style="color:var(--text4)">No members found</div>';
  drop.style.display='';
}
function ftTogM(u){if(_selM.includes(u))_selM=_selM.filter(x=>x!==u);else _selM.push(u);ftChips();ftFilt();}
function ftSelAll(){_selM=D.members.filter(m=>m.approved).map(m=>m.username);ftChips();ftFilt();}
function ftClrAll(){_selM=[];ftChips();ftFilt();}

async function saveTask(){
  const title=document.getElementById('ft-title')?.value.trim();if(!title){toast('Task name required');return;}
  const freq=document.getElementById('ft-freq')?.value;
  const dow=freq==='weekly'?parseInt(document.getElementById('ft-dow')?.value):null;
  const dayOfMonth=freq==='monthly'?parseInt(document.getElementById('ft-dom')?.value||1):null;
  const data={title,freq,dow:dow??null,dayOfMonth:dayOfMonth??null,
    time:document.getElementById('ft-time')?.value.trim()||'5:00 PM',
    deadline:document.getElementById('ft-deadline')?.value.trim()||'',
    dh:parseInt(document.getElementById('ft-dh')?.value||17),
    dm:parseInt(document.getElementById('ft-dm')?.value||0),
    note:document.getElementById('ft-note')?.value.trim()||'',
    assignees:[..._selM]};
  if(_editTId){data.id=_editTId;await fbSet(`tasks/${_editTId}`,data);toast('Task updated');}
  else{const nid=(await fbGet('taskNextId'))||10;data.id=nid;await fbSet(`tasks/${nid}`,data);await fbSet('taskNextId',nid+1);toast('Task added');}
  closeModal('modal-task');
}
async function delTask(id){if(!confirm('Delete this task?'))return;await fbDel(`tasks/${id}`);toast('Task deleted');}

// ═══ STATUS MODAL ═══
function openStatusModal(taskId,date){
  const task=D.tasks.find(t=>t.id==taskId);if(!task)return;
  document.getElementById('mst-title').textContent=task.title;
  const info=getSt(taskId,date),ms=task.assignees||[];
  const ov=isOverdue(task,date)&&getOv(taskId,date)!=='Done';
  let body=ov?`<div class="esc-banner" style="margin-bottom:12px"><span>⚠️</span><div style="font-size:13px;font-weight:700;color:var(--orange)">Past deadline — ${task.deadline}</div></div>`:'';

  // Show approved extension if any
  const extForTask=Object.values(D.extRequests).filter(r=>r.taskId==taskId&&r.date===date&&r.status==='Approved');
  if(extForTask.length){body+=`<div class="ne-box" style="margin-bottom:12px"><div class="ne-title">&#10003; Extension Approved</div><div class="ne-detail">New deadline: ${extForTask[0].proposedDate} ${extForTask[0].proposedTime}</div></div>`;}

  if(ms.length){
    body+=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Per-member — <b>${fmtD(new Date(date+'T00:00:00'))}</b></div>`;
    body+=`<div class="tbl-wrap"><table><thead><tr><th>Member</th><th>Role</th><th>Status</th><th>Remarks</th></tr></thead><tbody>`;
    ms.forEach(u=>{
      const mst=(info.members||{})[u]||'Pending',mrem=(info.memberRemarks||{})[u]||'',can=CU.isAdmin||u===CU.username,name=getMN(u),role=getRole(u);
      body+=`<tr>
        <td><div style="display:flex;align-items:center;gap:6px"><span class="av" style="width:22px;height:22px;font-size:8px">${ini(name)}</span>${name}</div></td>
        <td><span style="font-size:11px;color:var(--text3)">${role}</span></td>
        <td>${can?`<select class="finput nb" style="padding:4px 7px;font-size:12px;width:auto" onchange="smMember(${taskId},'${date}','${u}',this.value)">
          <option${mst==='Pending'?' selected':''}>Pending</option>
          <option${mst==='Ongoing'?' selected':''}>Ongoing</option>
          <option${mst==='Needs Extension'?' selected':''}>Needs Extension</option>
          <option${mst==='Done'?' selected':''}>Done</option>
        </select>`:`<span class="sbadge ${sbc(mst)}" style="cursor:default"><span class="sdot ${sdc(mst)}"></span>${mst}</span>`}</td>
        <td>${can?`<input class="finput nb" style="font-size:12px;padding:4px 7px;width:150px" placeholder="Remark..." value="${mrem}" onchange="smMRem(${taskId},'${date}','${u}',this.value)"/>`:`<span style="font-size:12px;color:var(--text3)">${mrem||'—'}</span>`}</td>
      </tr>`;
    });
    body+='</tbody></table></div>';
  }

  if(CU.isAdmin){
    const ov2=getOv(taskId,date);
    body+=`<div class="fg fg2" style="margin-top:10px">
      <div><label class="flabel">Overall Status</label><select class="finput nb" onchange="smOverall(${taskId},'${date}',this.value)">
        <option${ov2==='Pending'?' selected':''}>Pending</option>
        <option${ov2==='Ongoing'?' selected':''}>Ongoing</option>
        <option${ov2==='Needs Extension'?' selected':''}>Needs Extension</option>
        <option${ov2==='Done'?' selected':''}>Done</option>
      </select></div>
      <div><label class="flabel">Overall Remarks</label><input class="finput nb" value="${info.remarks||''}" onchange="smORem(${taskId},'${date}',this.value)"/></div>
    </div>`;
  }
  body+=`<div class="form-actions"><button class="btn" onclick="closeModal('modal-status')">Close</button></div>`;
  document.getElementById('mst-body').innerHTML=body;openModal('modal-status');
}

async function smMember(tid,date,u,val){
  const k=sKey(tid,date),task=D.tasks.find(t=>t.id==tid),cur=getSt(tid,date);
  const mems={...(cur.members||{}),[u]:val};
  // If "Needs Extension" selected, prompt for details
  if(val==='Needs Extension'&&!CU.isAdmin){
    document.getElementById('mne-body').innerHTML=`
      <p style="font-size:13px;color:var(--text3);margin-bottom:12px">Please provide a reason and proposed new deadline for admin review.</p>
      <div class="fg"><label class="flabel">Reason for Extension</label><textarea class="finput" id="ne-reason" rows="3" placeholder="Explain why you need more time..."></textarea></div>
      <div class="fg fg2">
        <div><label class="flabel">Proposed Date</label><input class="finput nb" id="ne-date" type="date" value="${date}"/></div>
        <div><label class="flabel">Proposed Time</label><input class="finput nb" id="ne-time" placeholder="e.g. 6:00 PM"/></div>
      </div>
      <div class="form-actions">
        <button class="btn teal" onclick="submitExtRequest(${tid},'${date}','${u}')">Submit Request</button>
        <button class="btn" onclick="closeModal('modal-ne')">Cancel</button>
      </div>`;
    openModal('modal-ne');return;
  }
  const overall=computeOverall(mems,task?.assignees||[]);
  await fbUpd(`statuses/${k}`,{members:mems,overall});
  await logAct(tid,date,getMN(u),val,'');
  toast('Status updated');
}

async function submitExtRequest(tid,date,u){
  const reason=document.getElementById('ne-reason')?.value.trim();
  const proposedDate=document.getElementById('ne-date')?.value;
  const proposedTime=document.getElementById('ne-time')?.value.trim();
  if(!reason){toast('Please provide a reason');return;}
  const task=D.tasks.find(t=>t.id==tid);
  await fbPush('extRequests',{taskId:tid,taskTitle:task?.title||'',memberUsername:u,memberName:getMN(u),reason,proposedDate,proposedTime,date,status:'Pending',ts:Date.now()});
  // Also update member status
  const k=sKey(tid,date),cur=getSt(tid,date);
  const mems={...(cur.members||{}),[u]:'Needs Extension'};
  const overall=computeOverall(mems,task?.assignees||[]);
  await fbUpd(`statuses/${k}`,{members:mems,overall});
  await logAct(tid,date,getMN(u),'Needs Extension','EXT_REQUESTED');
  closeModal('modal-ne');closeModal('modal-status');
  toast('Extension request submitted. Admin will be notified.');
}

async function smMRem(tid,date,u,val){await fbUpd(`statuses/${sKey(tid,date)}/memberRemarks`,{[u]:val});}
async function smOverall(tid,date,val){
  const task=D.tasks.find(t=>t.id==tid),cur=getSt(tid,date);
  // If admin sets overall, also sync member statuses
  await fbUpd(`statuses/${sKey(tid,date)}`,{overall:val});
  await logAct(tid,date,CU.name,val,'ADMIN_OVERRIDE');
  toast('Status updated');
}
async function smORem(tid,date,val){await fbUpd(`statuses/${sKey(tid,date)}`,{remarks:val});}

async function logAct(tid,date,who,status,note=''){
  const task=D.tasks.find(t=>t.id==tid),n=now();

}

async function addM(){
  const name=document.getElementById('nm-n')?.value.trim(),user=document.getElementById('nm-u')?.value.trim().toLowerCase(),pass=document.getElementById('nm-p')?.value,role=document.getElementById('nm-r')?.value||'Member';

async function bulkImport(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'}),ws=wb.Sheets[wb.SheetNames[0]],data=XLSX.utils.sheet_to_json(ws,{header:1});
      let added=0;
      for(const row of data){
        const name=(row[0]||'').toString().trim(),user=(row[1]||'').toString().trim().toLowerCase(),pass=(row[2]||'').toString().trim(),role=(row[3]||'Member').toString().trim();
        if(name&&user&&pass&&user!==ADMIN_UN&&!D.members.find(m=>m.username===user)){await fbPush('members',{name,username:user,password:pass,role,approved:true});added++;}
      }
      toast(`Imported ${added} member(s)`);
    }catch(e){toast('Could not read file');}
  };
  reader.readAsBinaryString(file);evt.target.value='';
}

function renderReports(){
  const el=document.getElementById('pg-reports');if(!el)return;
  const stats={};
  D.members.forEach(m=>{stats[m.username]={name:m.name,role:m.role||'Member',total:0,done:0,ne:0};});
  const dates=[];for(let i=0;i<30;i++){const d=new Date(now());d.setDate(now().getDate()-i);dates.push(ds(d));}
  dates.forEach(date=>{
    const d=new Date(date+'T00:00:00');
    D.tasks.forEach(t=>{
      if(!isSched(t,d))return;
      (t.assignees||[]).forEach(u=>{
        if(!stats[u])return;
        const mst=(getSt(t.id,date).members||{})[u]||'Pending';
        stats[u].total++;
        if(mst==='Done')stats[u].done++;
        if(mst==='Needs Extension')stats[u].ne++;
      });
    });
  });
  const sorted=Object.values(stats).sort((a,b)=>(b.total?b.done/b.total:0)-(a.total?a.done/a.total:0));
  const rows=sorted.map(m=>{
    const rate=m.total?Math.round(m.done/m.total*100):0;
    const col=rate>=80?'var(--green)':rate>=50?'var(--yellow)':'var(--red)';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:7px"><span class="av" style="width:22px;height:22px;font-size:8px">${ini(m.name)}</span>${m.name}</div></td>
      <td><span class="role-badge">${m.role}</span></td>
      <td style="text-align:center">${m.total}</td>
      <td style="text-align:center;color:var(--green);font-weight:600">${m.done}</td>
      <td style="text-align:center;color:var(--teal)">${m.ne}</td>
      <td style="text-align:center;color:var(--red)">${m.total-m.done-m.ne}</td>
      <td style="min-width:130px"><div style="display:flex;align-items:center;gap:6px"><div class="prog-bar" style="flex:1;height:6px"><div class="prog-fill" style="width:${rate}%;background:${col}"></div></div><span style="font-size:11px;font-weight:700;color:${col}">${rate}%</span></div></td>
    </tr>`;
  }).join('');
  el.innerHTML=`<div class="page-header"><div class="page-title">Compliance Report — Last 30 Days</div><button class="btn sm" onclick="exportReport()">Export Excel</button></div>
    <div class="tbl-wrap"><table><thead><tr><th>Member</th><th>Role</th><th>Total</th><th>Done</th><th>Extension</th><th>Pending</th><th>Rate</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="7" class="empty-state">No data yet</td></tr>'}</tbody></table></div>`;
}
function exportReport(){
  const rows=[];
  D.members.forEach(m=>{
    let total=0,done=0,ne=0;
    const dates=[];for(let i=0;i<30;i++){const d=new Date(now());d.setDate(now().getDate()-i);dates.push(ds(d));}
    dates.forEach(date=>{const d=new Date(date+'T00:00:00');D.tasks.forEach(t=>{if(!isSched(t,d)||!(t.assignees||[]).includes(m.username))return;const mst=(getSt(t.id,date).members||{})[m.username]||'Pending';total++;if(mst==='Done')done++;if(mst==='Needs Extension')ne++;});});
    rows.push({Name:m.name,Role:m.role||'Member',Total:total,Done:done,'Needs Extension':ne,Pending:total-done-ne,'Rate %':total?Math.round(done/total*100):0});
  });
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Report');
  XLSX.writeFile(wb,`GovernanceHub_Report_${ds(now())}.xlsx`);
}

function renderMyTasks(){
  const el=document.getElementById('pg-my-tasks');if(!el)return;
  const date=ds(viewDate);
  const myT=D.tasks.filter(t=>(t.assignees||[]).includes(CU.username)&&isSched(t,viewDate));
  const byS={Pending:[],Ongoing:[],'Needs Extension':[],Done:[]};
  myT.forEach(t=>{const s=((getSt(t.id,date).members)||{})[CU.username]||'Pending';if(!byS[s])byS[s]=[];byS[s].push(t);});
  const secCfg=[{k:'Pending',l:'Pending',c:'sh-red'},{k:'Ongoing',l:'Ongoing',c:'sh-yellow'},{k:'Needs Extension',l:'Needs Extension',c:'sh-teal'},{k:'Done',l:'Completed',c:'sh-green'}];
  let secs=secCfg.map(sc=>{
    const list=byS[sc.k]||[];if(!list.length)return'';
    const rows=list.map(t=>{
      const info=getSt(t.id,date),mst=(info.members||{})[CU.username]||'Pending',mrem=(info.memberRemarks||{})[CU.username]||'';
      const ov=isOverdue(t,date)&&mst!=='Done';
      // Check if extension approved for this member
      const extApproved=Object.values(D.extRequests).find(r=>r.taskId==t.id&&r.date===date&&r.memberUsername===CU.username&&r.status==='Approved');
      return `<tr class="${ov?'overdue-row':''}">
        <td><div style="font-weight:600">${t.title}${ov&&!extApproved?'&nbsp;<span style="color:var(--red);font-size:10px;font-weight:700">OVERDUE</span>':''}</div>
          <span class="freq-chip fc-${t.freq}">${t.freq}</span>
          ${extApproved?`<span style="font-size:10px;color:var(--teal);font-weight:700;margin-left:4px">&#10003; Extension to ${extApproved.proposedDate} ${extApproved.proposedTime}</span>`:''}
        </td>
        <td><span class="dl-chip${ov&&!extApproved?' overdue':''}">${t.deadline||'—'}</span></td>
        <td><select class="finput nb" style="padding:5px 9px;font-size:12px;width:auto" onchange="myUpdSt(${t.id},'${date}',this.value)">
          <option${mst==='Pending'?' selected':''}>Pending</option>
          <option${mst==='Ongoing'?' selected':''}>Ongoing</option>
          <option${mst==='Needs Extension'?' selected':''}>Needs Extension</option>
          <option${mst==='Done'?' selected':''}>Done</option>
        </select></td>
        <td><input class="finput nb" style="font-size:12px;padding:5px 9px;width:150px" placeholder="Remark..." value="${mrem}" onchange="smMRem(${t.id},'${date}','${CU.username}',this.value)"/></td>
      </tr>`;
    }).join('');
    return `<div class="section-hdr ${sc.c}">${sc.l} <span style="opacity:.7">(${list.length})</span></div><div class="tbl-wrap"><table><thead><tr><th>Task</th><th>Deadline</th><th>My Status</th><th>Remarks</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }).join('');
  el.innerHTML=`<div class="page-header">
    <div class="page-title">My Tasks — ${fmtD(viewDate)}</div>
    <div class="date-nav">
      <button class="nav-arrow" onclick="viewDate.setDate(viewDate.getDate()-1);renderMyTasks()">&#8592;</button>
      ${dateSel(viewDate,"viewDate=new Date(this.value+'T00:00:00');renderMyTasks()")}
      <button class="nav-arrow" onclick="viewDate.setDate(viewDate.getDate()+1);renderMyTasks()">&#8594;</button>
      <button class="btn sm" onclick="openRemind()" style="margin-left:4px">Reminders</button>
    </div>
  </div>
  ${metricsHTML(date,myT,true)}
  ${!myT.length?'<div class="empty-state">No tasks assigned to you for this day.</div>':secs}`;
}

function myUpdSt(tid,date,val){smMember(tid,date,CU.username,val);}

// ═══ CALENDAR ═══
function calKey(d){return`${CU.username}_${d}`.replace(/[.#$\/\[\]]/g,'_');}
function getCalE(d){const k=calKey(d);return D.calEntries[k]?Object.values(D.calEntries[k]):[];}
function getExpandedCalE(d){
  const direct=getCalE(d),dDate=new Date(d+'T00:00:00'),recurring=[];
  for(const[,en]of Object.entries(D.calEntries)){
    if(!en)continue;
    for(const[,e]of Object.entries(en)){
      if(!e.recur||e.recur==='none')continue;
      const orig=new Date((e.originDate||'2000-01-01')+'T00:00:00');
      if(orig>=dDate||ds(orig)===d)continue;
      let match=e.recur==='daily'||(e.recur==='weekly'&&dDate.getDay()===orig.getDay())||(e.recur==='monthly'&&dDate.getDate()===orig.getDate());
      if(match)recurring.push({...e,_recurring:true});
    }
  }
  return[...direct,...recurring];
}
function renderCalendar(){
  const y=calViewDate.getFullYear(),m=calViewDate.getMonth();
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),tds=ds(now());
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cal-cell other-m"></div>`;
  for(let d=1;d<=dim;d++){
    const dd=new Date(y,m,d),dds=ds(dd),isT=dds===tds,isSel=selCalDate===dds;
    const entries=getExpandedCalE(dds);
    const myA=D.tasks.filter(t=>(t.assignees||[]).includes(CU.username)&&isSched(t,dd));
    const eh=[...myA.slice(0,1).map(t=>`<div class="cal-entry assigned">${t.title}</div>`),...entries.slice(0,2).map(e=>`<div class="cal-entry ${e.type||'personal'}">${e.title}</div>`)].join('');
    cells+=`<div class="cal-cell${isT?' today':''}${isSel?' sel':''}" onclick="calSel('${dds}')"><span class="cal-date">${d}</span>${eh}</div>`;
  }
  document.getElementById('pg-calendar').innerHTML=`
    <div class="page-header"><div class="page-title">My Calendar</div><button class="btn primary" onclick="openCalEntry(selCalDate||'${tds}')">+ Add Entry</button></div>
    <div class="cal-wrap" style="margin-bottom:16px">
      <div class="cal-header">
        <button class="btn sm" onclick="calViewDate.setMonth(calViewDate.getMonth()-1);renderCalendar()">&#8592;</button>
        <div class="cal-title">${fmtM(calViewDate)}</div>
        <button class="btn sm" onclick="calViewDate.setMonth(calViewDate.getMonth()+1);renderCalendar()">&#8594;</button>
      </div>
      <div class="cal-grid">${DOW.map(d=>`<div class="cal-dh">${d}</div>`).join('')}${cells}</div>
    </div>
    <div id="cal-day-panel">${selCalDate?calDayHTML(selCalDate):'<div class="panel"><div class="empty-state" style="padding:16px">Click any date to view or add entries</div></div>'}</div>`;
}
function calDayHTML(dds){
  const d=new Date(dds+'T00:00:00'),entries=getExpandedCalE(dds);
  const myA=D.tasks.filter(t=>(t.assignees||[]).includes(CU.username)&&isSched(t,d));
  const taskRows=myA.map(t=>{const mst=((getSt(t.id,dds).members)||{})[CU.username]||'Pending';return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-weight:600;font-size:13px">${t.title}</div><span class="dl-chip" style="font-size:11px">${t.deadline||''}</span></div><span class="sbadge ${sbc(mst)}" style="cursor:default"><span class="sdot ${sdc(mst)}"></span>${mst}</span></div>`;}).join('');
  const personalRows=entries.map(e=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-weight:600;font-size:13px">${e.title}${e._recurring?' <span style="font-size:10px;color:var(--text3)">(recurring)</span>':''}</div>${e.note?`<div style="font-size:11px;color:var(--text3)">${e.note}</div>`:''}</div><div style="display:flex;align-items:center;gap:5px"><span class="cal-entry ${e.type||'personal'}" style="margin:0">${e.type||'personal'}</span>${e.recur&&e.recur!=='none'?`<span style="font-size:10px;background:var(--purple-light);color:var(--purple);padding:1px 5px;border-radius:20px;font-weight:600">${e.recur}</span>`:''}${!e._recurring?`<button class="btn sm del" onclick="calRemE('${e.originDate||dds}','${e._key}')">&#x2715;</button>`:''}
  </div></div>`).join('');
  return `<div class="panel"><h3>${fmtD(d)} <button class="btn sm primary" onclick="openCalEntry('${dds}')" style="float:right">+ Add</button></h3>${myA.length?`<div style="margin-bottom:12px"><div class="section-hdr sh-purple" style="margin-bottom:6px">Assigned Tasks (${myA.length})</div>${taskRows}</div>`:''}
    <div class="section-hdr sh-blue" style="margin-bottom:6px">Personal Entries</div>${personalRows||'<div style="color:var(--text4);font-size:13px;padding:8px 0">No entries yet.</div>'}
  </div>`;
}
function renderCalDay(dds){const p=document.getElementById('cal-day-panel');if(p)p.innerHTML=calDayHTML(dds);}
function calSel(dds){selCalDate=dds;renderCalendar();}
function openCalEntry(dds){
  if(!dds)dds=ds(now());
  document.getElementById('mc-title').textContent='Add Entry — '+fmtD(new Date(dds+'T00:00:00'));
  document.getElementById('mc-body').innerHTML=`
    <div class="fg"><label class="flabel">Title</label><input class="finput nb" id="ce-t" placeholder="e.g. Submit report, Meeting..."/></div>
    <div class="fg fg2">
      <div><label class="flabel">Type</label><select class="finput nb" id="ce-type"><option value="personal">Personal to-do</option><option value="reminder">Reminder</option><option value="task">Custom task</option></select></div>
      <div><label class="flabel">Time (optional)</label><input class="finput nb" id="ce-time" placeholder="e.g. 10:00 AM"/></div>
    </div>
    <div class="fg"><label class="flabel">Recurrence</label><select class="finput nb" id="ce-recur"><option value="none">No recurrence</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div>
    <div class="fg"><label class="flabel">Notes</label><textarea class="finput" id="ce-note" placeholder="Details..."></textarea></div>
    <div class="form-actions"><button class="btn primary" onclick="saveCalE('${dds}')">Save</button><button class="btn" onclick="closeModal('modal-cal')">Cancel</button></div>`;
  openModal('modal-cal');
}
async function saveCalE(dds){
  const title=document.getElementById('ce-t')?.value.trim();if(!title){toast('Title required');return;}
  const type=document.getElementById('ce-type')?.value,time=document.getElementById('ce-time')?.value.trim(),note=document.getElementById('ce-note')?.value.trim(),recur=document.getElementById('ce-recur')?.value||'none';
  await fbPush(`calEntries/${calKey(dds)}`,{title:time?`${title} (${time})`:title,type,note,recur,originDate:dds});
  closeModal('modal-cal');toast('Entry saved');calSel(dds);
}
async function calRemE(dds,ek){await fbDel(`calEntries/${calKey(dds)}/${ek}`);toast('Removed');if(selCalDate)renderCalDay(selCalDate);}

// Reminders
function openRemind(){
  const date=ds(now());
  const myT=D.tasks.filter(t=>{if(!isSched(t,now()))return false;return CU.isAdmin||(t.assignees||[]).includes(CU.username);});
  const getS=t=>CU.isAdmin?getOv(t.id,date):((getSt(t.id,date).members||{})[CU.username]||'Pending');
  const rows=myT.map(t=>{const st=getS(t),ov=isOverdue(t,date)&&st!=='Done';return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--yellow-mid);font-size:13px"><span style="font-weight:500">${t.title}${ov?' ⚠️':''}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--text3)">${t.deadline}</span><span class="sbadge ${sbc(st)}" style="cursor:default;font-size:11px"><span class="sdot ${sdc(st)}"></span>${st}</span></div></div>`;}).join('');
  document.getElementById('mr-body').innerHTML=`<div style="background:var(--yellow-light);border:1px solid var(--yellow-mid);border-radius:var(--radius);padding:14px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:8px">${fmtD(now())}</div>${rows||'<div style="color:var(--green);font-weight:600;font-size:13px">All tasks complete!</div>'}</div>`;
  openModal('modal-remind');
}
function scheduleReminders(){setInterval(()=>{const n=now(),h=n.getHours(),m=n.getMinutes();if((h===9&&m===0)||(h===16&&m===50))openRemind();},60000);}

// Close dropdown on outside click
document.addEventListener('click',e=>{
  const dd=document.getElementById('dd-data');
  if(dd&&!dd.contains(e.target))closeDD();
  const drops=['ft-mdrop','grp-mdrop','inc-tag-drop'];
  drops.forEach(id=>{const d=document.getElementById(id);if(d&&!d.contains(e.target))d.style.display='none';});
});
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');}));
</script>
</body>
