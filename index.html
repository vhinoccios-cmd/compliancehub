<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ComplianceHub</title>
<style>
:root{
  --bg:#f4f6f9;--surface:#fff;--border:#e2e6ea;
  --text:#1a1d23;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --blue:#2563eb;--blue-light:#eff6ff;--blue-mid:#bfdbfe;
  --green:#16a34a;--green-light:#f0fdf4;--green-mid:#bbf7d0;
  --yellow:#ca8a04;--yellow-light:#fefce8;--yellow-mid:#fde68a;
  --red:#dc2626;--red-light:#fef2f2;--red-mid:#fecaca;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --orange:#ea580c;--orange-light:#fff7ed;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spinner.sm{width:18px;height:18px;border-width:2px}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-screen{min-height:100vh;display:none;align-items:center;justify-content:center}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 40px;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
.auth-logo{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.5px}
.auth-logo span{color:var(--blue)}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:26px}
.flabel{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px}
.finput{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:var(--surface);transition:border .15s;margin-bottom:12px}
.finput:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.finput{resize:vertical;min-height:64px;margin-bottom:0}
.finput.nb{margin-bottom:0}
.auth-btn{width:100%;padding:11px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
.auth-btn.primary{background:var(--blue);color:#fff}.auth-btn.primary:hover{background:#1d4ed8}
.auth-btn.sec{background:var(--surface);color:var(--text2);border:1px solid var(--border)}.auth-btn.sec:hover{background:var(--bg)}
.msg{font-size:12px;padding:8px 10px;border-radius:var(--radius);margin-bottom:10px;display:none}
.msg.err{background:var(--red-light);color:#b91c1c}.msg.ok{background:var(--green-light);color:#15803d}
.app{display:none;flex-direction:column;min-height:100vh}
.topnav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:200}
.brand{font-size:16px;font-weight:800;letter-spacing:-.4px;white-space:nowrap}.brand span{color:var(--blue)}
.nav-center{display:flex;gap:2px;overflow-x:auto;flex:1;margin:0 12px}
.nav-tab{padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap}
.nav-tab:hover{background:var(--bg);color:var(--text2)}.nav-tab.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.nav-tab.alert{position:relative}.nav-tab.alert::after{content:'';position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border);font-size:12px;font-weight:600}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:10px;font-weight:700;flex-shrink:0;width:26px;height:26px}
.av.g{background:var(--green-light);color:var(--green)}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg)}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.primary:hover{background:#1d4ed8}
.btn.warning{background:#f59e0b;color:#fff;border-color:#f59e0b}.btn.warning:hover{background:#d97706}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}.btn.success:hover{background:#15803d}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.sm{padding:4px 10px;font-size:12px}.btn.edit{color:var(--blue);border-color:var(--blue-mid);background:var(--blue-light)}
.btn.del{color:var(--red);border-color:var(--red-mid);background:var(--red-light)}
.btn.approve{color:var(--green);border-color:var(--green-mid);background:var(--green-light)}
.main{flex:1;padding:20px 22px;max-width:1400px;margin:0 auto;width:100%}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.page-title{font-size:19px;font-weight:800;letter-spacing:-.4px}
.date-nav{display:flex;align-items:center;gap:6px}
.nav-arrow{width:30px;height:30px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-arrow:hover{background:var(--bg);border-color:var(--blue);color:var(--blue)}
.metrics-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:13px 14px;box-shadow:var(--shadow)}
.mc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.mc-val{font-size:26px;font-weight:800;line-height:1}
.mc-blue .mc-label,.mc-blue .mc-val{color:var(--blue)}.mc-green .mc-label,.mc-green .mc-val{color:var(--green)}
.mc-yellow .mc-label,.mc-yellow .mc-val{color:var(--yellow)}.mc-red .mc-label,.mc-red .mc-val{color:var(--red)}
.mc-black .mc-label{color:var(--text3)}.mc-black .mc-val{color:var(--text)}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.prog-bar{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .4s}
.prog-label{font-size:12px;font-weight:700;color:var(--text2);min-width:34px;text-align:right}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-radius:var(--radius);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sh-blue{background:var(--blue-light);color:#1d4ed8}.sh-green{background:var(--green-light);color:#15803d}
.sh-yellow{background:var(--yellow-light);color:#92400e}.sh-red{background:var(--red-light);color:#b91c1c}
.sh-purple{background:var(--purple-light);color:var(--purple)}.sh-orange{background:var(--orange-light);color:var(--orange)}
.tbl-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.tbl-wrap table{width:100%;border-collapse:collapse}
.tbl-wrap thead th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);border-bottom:1px solid var(--border)}
.tbl-wrap tbody td{padding:10px 12px;border-bottom:1px solid #f1f3f5;vertical-align:middle;font-size:13px}
.tbl-wrap tbody tr:last-child td{border-bottom:none}.tbl-wrap tbody tr:hover td{background:#f8fafc}
.tbl-wrap tbody tr.overdue td{background:#fff8f8}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer}
.sb-p{background:var(--red-light);color:#b91c1c;border:1px solid var(--red-mid)}
.sb-o{background:var(--yellow-light);color:#92400e;border:1px solid var(--yellow-mid)}
.sb-d{background:var(--green-light);color:#15803d;border:1px solid var(--green-mid)}
.sb-w{background:var(--blue-light);color:#1d4ed8;border:1px solid var(--blue-mid)}
.sb-esc{background:var(--orange-light);color:var(--orange);border:1px solid #fed7aa}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd-p{background:var(--red)}.sd-o{background:var(--yellow)}.sd-d{background:var(--green)}.sd-w{background:var(--blue)}.sd-esc{background:var(--orange)}
.tt-wrap{position:relative;display:inline-block}
.tt-box{display:none;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;border-radius:var(--radius);padding:10px 14px;font-size:12px;min-width:200px;z-index:999;line-height:1.7;box-shadow:var(--shadow-md)}
.tt-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1f2937}
.tt-wrap:hover .tt-box{display:block}
.freq-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.fc-daily{background:var(--blue-light);color:#1d4ed8}.fc-weekly{background:var(--purple-light);color:var(--purple)}
.fc-monthly{background:var(--green-light);color:var(--green)}.fc-quarterly{background:var(--orange-light);color:var(--orange)}
.fc-eom{background:#fdf4ff;color:#9333ea}.fc-occasional{background:#fff7ed;color:#c2410c}.fc-other{background:#f1f5f9;color:#475569}
.dl-chip{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:2px 8px;font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.dl-chip.overdue{background:var(--red-light);border-color:var(--red-mid);color:var(--red)}
.panel{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h3{font-size:14px;font-weight:700;margin-bottom:14px}
.fg{display:grid;gap:10px;margin-bottom:10px}.fg2{grid-template-columns:1fr 1fr}.fg3{grid-template-columns:1fr 1fr 1fr}.fg4{grid-template-columns:1fr 1fr 1fr 1fr}
.mselect-wrap{border:1px solid var(--border);border-radius:var(--radius);padding:7px;min-height:40px;background:var(--surface);display:flex;flex-wrap:wrap;gap:4px;align-items:flex-start;cursor:text}
.mselect-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.m-chip{display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);border:1px solid var(--blue-mid);color:#1d4ed8;border-radius:20px;padding:2px 8px;font-size:12px;font-weight:500}
.m-chip .rm{cursor:pointer;color:#93c5fd;margin-left:2px;font-size:13px}.m-chip .rm:hover{color:var(--red)}
.mdrop{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);max-height:200px;overflow-y:auto;margin-top:4px;box-shadow:var(--shadow-md)}
.mdrop-item{padding:7px 10px;font-size:13px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:7px}
.mdrop-item:hover{background:var(--bg)}.mdrop-item.sel{background:var(--blue-light);color:var(--blue)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(17,24,39,.55);z-index:500;align-items:flex-start;justify-content:center;padding:50px 16px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:22px;width:100%;max-width:560px;box-shadow:var(--shadow-md);position:relative}
.modal.wide{max-width:720px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:15px;color:var(--text3);display:flex;align-items:center;justify-content:center}.modal-close:hover{background:var(--bg)}
.cal-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.cal-title{font-size:14px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)}
.cal-dh{text-align:center;padding:7px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);background:#f8fafc;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.cal-cell{min-height:80px;padding:5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cal-cell:hover{background:var(--blue-light)}.cal-cell.today{background:#eff6ff}.cal-cell.other-m{background:#f8fafc;opacity:.55}
.cal-cell.sel{background:var(--blue-light);outline:2px solid var(--blue);outline-offset:-2px}
.cal-date{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:2px;display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .cal-date{background:var(--blue);color:#fff}
.cal-entry{padding:1px 4px;font-size:9px;font-weight:600;border-radius:0 3px 3px 0;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border-left:2px solid}
.cal-entry.personal{background:var(--green-light);border-left-color:var(--green);color:#15803d}
.cal-entry.reminder{background:var(--yellow-light);border-left-color:var(--yellow);color:#92400e}
.cal-entry.task{background:var(--purple-light);border-left-color:var(--purple);color:var(--purple)}
.cal-entry.assigned{background:var(--blue-light);border-left-color:var(--blue);color:#1d4ed8}
.cal-entry.escalated{background:var(--orange-light);border-left-color:var(--orange);color:var(--orange)}
.toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:#fff;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.admin-badge{background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700}
.role-badge{padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;background:var(--purple-light);color:var(--purple)}
.empty-state{text-align:center;padding:36px;color:var(--text4);font-size:13px}
.sync-indicator{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.busy{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.form-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.bc-bar{background:#1e3a5f;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.notif-banner{position:fixed;top:0;left:0;right:0;z-index:9999;background:#1e3a5f;color:#fff;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow-md);transform:translateY(-100%);transition:transform .3s}
.notif-banner.show{transform:translateY(0)}
.esc-banner{background:var(--orange-light);border:1px solid #fed7aa;border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.streak-card{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.streak-num{font-size:36px;font-weight:800}
.evidence-thumb{width:60px;height:60px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.stat-bar-wrap{margin-bottom:8px}
.stat-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.stat-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.tab-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab-pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text3)}
.tab-pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.incident-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.incident-card.high{border-left:3px solid var(--red)}.incident-card.medium{border-left:3px solid var(--yellow)}.incident-card.low{border-left:3px solid var(--green)}
@media(max-width:900px){.metrics-row{grid-template-columns:repeat(2,1fr)}.fg2,.fg3,.fg4{grid-template-columns:1fr}.main{padding:12px}.topnav{padding:0 12px}}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text3)">Connecting to ComplianceHub...</div>
</div>

<div class="notif-banner" id="notif-banner">
  <div><div style="font-weight:700;font-size:14px" id="nb-title"></div><div style="font-size:12px;opacity:.85" id="nb-body"></div></div>
  <div style="cursor:pointer;font-size:18px;opacity:.7;padding:4px 8px" onclick="document.getElementById('notif-banner').classList.remove('show')">&#x2715;</div>
</div>

<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Compliance<span>Hub</span></div>
    <div class="auth-sub">Team compliance tracker &mdash; live sync</div>
    <label class="flabel">Username</label>
    <input class="finput" id="login-user" placeholder="Your username" autocomplete="username"/>
    <label class="flabel">Password</label>
    <input class="finput" id="login-pass" type="password" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="msg err" id="login-err">Incorrect username or password.</div>
    <button class="auth-btn primary" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div class="app" id="app">
  <div class="bc-bar" id="bc-bar" style="display:none">
    <div><div style="font-size:13px;font-weight:500" id="bc-msg"></div><div style="font-size:11px;opacity:.7" id="bc-time"></div></div>
    <button class="btn sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="dismissBC()">Dismiss</button>
  </div>
  <nav class="topnav">
    <div class="brand">Compliance<span>Hub</span></div>
    <div class="nav-center" id="nav-center"></div>
    <div class="nav-right">
      <div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div>Live</div>
      <div class="user-chip" id="user-chip"></div>
      <button class="btn sm" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>
  <div class="main" id="main-content">
    <div id="pg-dashboard"></div>
    <div id="pg-tasks" style="display:none"></div>
    <div id="pg-members" style="display:none"></div>
    <div id="pg-transactions" style="display:none"></div>
    <div id="pg-reports" style="display:none"></div>
    <div id="pg-incidents" style="display:none"></div>
    <div id="pg-calendar" style="display:none"></div>
    <div id="pg-my-tasks" style="display:none"></div>
    <div id="pg-my-dashboard" style="display:none"></div>
  </div>
</div>

<!-- Modals -->
<div class="modal-bg" id="modal-status"><div class="modal wide"><button class="modal-close" onclick="closeModal('modal-status')">&#x2715;</button><h3 id="mst-title">Update Status</h3><div id="mst-body"></div></div></div>
<div class="modal-bg" id="modal-task"><div class="modal wide"><button class="modal-close" onclick="closeModal('modal-task')">&#x2715;</button><h3 id="mt-title">Task</h3><div id="mt-body"></div></div></div>
<div class="modal-bg" id="modal-cal"><div class="modal"><button class="modal-close" onclick="closeModal('modal-cal')">&#x2715;</button><h3 id="mc-title">Add Entry</h3><div id="mc-body"></div></div></div>
<div class="modal-bg" id="modal-remind"><div class="modal"><button class="modal-close" onclick="closeModal('modal-remind')">&#x2715;</button><h3>Daily Reminder</h3><div id="mr-body"></div><div class="form-actions"><button class="btn primary" onclick="closeModal('modal-remind')">Dismiss</button></div></div></div>

// Firebase
const fbRef=p=>FDB.ref(p);
const fbGet=async p=>{const s=await fbRef(p).get();return s.exists()?s.val():null;};
const fbSet=async(p,v)=>{setSyncing(1);await fbRef(p).set(v);setSyncing(0);};
const fbUpd=async(p,v)=>{setSyncing(1);await fbRef(p).update(v);setSyncing(0);};
const fbPush=async(p,v)=>{setSyncing(1);const r=await fbRef(p).push(v);setSyncing(0);return r.key;};
const fbDel=async p=>{setSyncing(1);await fbRef(p).remove();setSyncing(0);};
function fbListen(p,cb){const r=fbRef(p);r.on('value',s=>cb(s.exists()?s.val():null));_listeners.push(r);}
function stopListeners(){_listeners.forEach(r=>r.off('value'));_listeners=[];}
function setSyncing(v){const d=document.getElementById('sync-dot');if(d)d.classList.toggle('busy',!!v);}

// Helpers
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const ds=d=>d.toISOString().slice(0,10);
const fmtD=d=>d.toLocaleDateString('en-PH',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
const fmtM=d=>d.toLocaleDateString('en-PH',{month:'long',year:'numeric'});
const now=()=>new Date();

function isSched(t,d){
  if(!t||!t.freq)return false;
  const dow=d.getDay(),date=d.getDate(),month=d.getMonth();
  if(t.freq==='daily')return true;
  if(t.freq==='weekly')return parseInt(t.dow)===dow;
  if(t.freq==='monthly')return parseInt(t.dayOfMonth||1)===date;
  if(t.freq==='quarterly'){
    const qMonths=[0,3,6,9];
    return qMonths.includes(month)&&date===1;
  }
  if(t.freq==='eom'){
    const lastDay=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    return date===lastDay;
  }
  return false;
}

function isOverdue(t,date){
  const n=now();
  const dds=ds(n);
  if(date!==dds)return false;
  const h=t.deadlineHour||17,m=t.deadlineMin||0;
  return n.getHours()>h||(n.getHours()===h&&n.getMinutes()>m);
}

const sKey=(id,date)=>`${date}_${id}`;
const getSt=(id,date)=>D.statuses[sKey(id,date)]||{overall:'Pending',remarks:'',members:{},memberRemarks:{},evidence:{},approvals:{}};
const getOv=(id,date)=>getSt(id,date).overall||'Pending';
const getMN=u=>u===ADMIN_UN?ADMIN_NAME:(D.members.find(m=>m.username===u)?.name||u);
const getRole=u=>u===ADMIN_UN?'Admin':(D.members.find(m=>m.username===u)?.role||'Member');

function sbc(s){return s==='Done'?'sb-d':s==='Ongoing'?'sb-o':s==='Awaiting Approval'?'sb-w':s==='Escalated'?'sb-esc':'sb-p';}
function sdc(s){return s==='Done'?'sd-d':s==='Ongoing'?'sd-o':s==='Awaiting Approval'?'sd-w':s==='Escalated'?'sd-esc':'sd-p';}

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showMsg(id,msg){const e=document.getElementById(id);if(e){e.textContent=msg;e.style.display='block';}}
function hideMsg(id){const e=document.getElementById(id);if(e)e.style.display='none';}

// Session
function saveSession(){if(CU)localStorage.setItem(SESSION_KEY,JSON.stringify(CU));}
function clearSession(){localStorage.removeItem(SESSION_KEY);}
function loadSession(){try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null');}catch{return null;}}

function statusBadge(s,taskId,date,editable=true){
  const info=getSt(taskId,date),task=D.tasks.find(t=>t.id==taskId),ms=task?.assignees||[];
  const byS={Pending:[],Ongoing:[],Done:[],'Awaiting Approval':[]};
  ms.forEach(u=>{const st=(info.members||{})[u]||'Pending';(byS[st]||byS.Pending).push(getMN(u));});
  const tip=Object.entries(byS).filter(([,v])=>v.length)
    .map(([k,v])=>`<div><b style="color:${k==='Done'?'#4ade80':k==='Ongoing'?'#fbbf24':k==='Awaiting Approval'?'#60a5fa':'#f87171'}">${k}:</b> ${v.join(', ')}</div>`).join('');
  const clickFn=editable?`onclick="openStatusModal(${taskId},'${date}')"`:'' ;
  return `<div class="tt-wrap"><span class="sbadge ${sbc(s)}" ${clickFn}><span class="sdot ${sdc(s)}"></span>${s}</span>${tip?`<div class="tt-box">${tip}</div>`:''}</div>`;
}

function metricsHTML(date,tasks,myStatus=false){
  const getS=t=>myStatus?((getSt(t.id,date).members||{})[CU.username]||'Pending'):getOv(t.id,date);
  const done=tasks.filter(t=>getS(t)==='Done').length;
  const ongoing=tasks.filter(t=>getS(t)==='Ongoing').length;
  const pending=tasks.filter(t=>getS(t)==='Pending').length;
  const total=tasks.length,pct=total?Math.round(done/total*100):0;
  return `<div class="metrics-row">
    <div class="metric-card mc-blue"><div class="mc-label">Today's Tasks</div><div class="mc-val">${total}</div></div>
    <div class="metric-card mc-green"><div class="mc-label">Completed</div><div class="mc-val">${done}</div></div>
    <div class="metric-card mc-yellow"><div class="mc-label">Ongoing</div><div class="mc-val">${ongoing}</div></div>
    <div class="metric-card mc-red"><div class="mc-label">Pending</div><div class="mc-val">${pending}</div></div>
    <div class="metric-card mc-black"><div class="mc-label">Completion</div><div class="mc-val">${pct}%</div></div>
  </div><div class="prog-row"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-label">${pct}%</div></div>`;
}

function dateSel(d,onchange='viewDate=new Date(this.value+\'T00:00:00\');rerender()'){
  const n=now();let opts='';
  for(let i=-30;i<=14;i++){const dd=new Date(n);dd.setDate(n.getDate()+i);const dds=ds(dd);opts+=`<option value="${dds}"${ds(d)===dds?' selected':''}>${i===0?'Today — '+fmtD(dd):fmtD(dd)}</option>`;}
  return `<select onchange="${onchange}" style="padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;max-width:220px">${opts}</select>`;
}

// Init
async function initApp(){
  try{
    const existing=await fbGet('tasks');
    if(!existing){const obj={};DEFAULT_TASKS.forEach(t=>{obj[t.id]=t;});await fbSet('tasks',obj);await fbSet('taskNextId',10);}
    const session=loadSession();
    if(session){
      if(session.isAdmin){CU=session;startApp();return;}
      const mems=await fbGet('members')||{};
      const match=Object.values(mems).find(m=>m.username===session.username&&m.approved);
      if(match){CU=session;startApp();return;}
    }
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
  }catch(e){
    document.getElementById('loading-screen').innerHTML=`<div style="color:var(--red);text-align:center;padding:24px;max-width:400px"><b>Connection failed</b><br>${e.message}</div>`;
  }
}
initApp();

async function doLogin(){
  hideMsg('login-err');
  const u=document.getElementById('login-user').value.trim().toLowerCase();
  const p=document.getElementById('login-pass').value;
  if(u===ADMIN_UN&&p===ADMIN_PW){CU={username:'admin',name:ADMIN_NAME,isAdmin:true};saveSession();startApp();return;}
  const mems=await fbGet('members')||{};
  const match=Object.values(mems).find(m=>m.username===u&&m.password===p&&m.approved);
  if(match){CU={username:match.username,name:match.name,isAdmin:false,role:match.role};saveSession();startApp();return;}
  showMsg('login-err','Incorrect username or password.');
}

function doLogout(){stopListeners();clearSession();CU=null;document.getElementById('app').style.display='none';document.getElementById('auth-screen').style.display='flex';['login-user','login-pass'].forEach(id=>document.getElementById(id).value='');viewDate=new Date();}

function startApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';

  const adminTabs=[
    {id:'dashboard',l:'Dashboard'},
    {id:'tasks',l:'Tasks'},
    {id:'members',l:'Members'},
    {id:'incidents',l:'Incidents'},
    {id:'transactions',l:'Transactions'},
    {id:'reports',l:'Reports'},
    {id:'calendar',l:'My Calendar'},
  ];
  const memberTabs=[
    {id:'my-dashboard',l:'My Dashboard'},
    {id:'my-tasks',l:'My Tasks'},
    {id:'calendar',l:'My Calendar'},
    {id:'incidents',l:'Incidents'},
  ];
  const tabs=CU.isAdmin?adminTabs:memberTabs;
  document.getElementById('nav-center').innerHTML=tabs.map(t=>`<button class="nav-tab" id="ntab-${t.id}" onclick="showPage('${t.id}')">${t.l}</button>`).join('');
  document.getElementById('user-chip').innerHTML=`<span class="av${CU.isAdmin?' g':''}">${ini(CU.name)}</span>${CU.name}${CU.isAdmin?'&nbsp;<span class="admin-badge">Admin</span>':'&nbsp;<span class="role-badge">'+(CU.role||'Member')+'</span>'}`;

  fbListen('tasks',v=>{D.tasks=v?Object.values(v).filter(Boolean):[];D._tasksLoaded=true;rerender();});
  fbListen('members',v=>{D.members=v?Object.values(v).filter(Boolean):[];D._membersLoaded=true;rerender();});
  fbListen('statuses',v=>{D.statuses=v||{};rerender();});
  fbListen('actLog',v=>{D.actLog=v?Object.values(v).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,500):[];if(_curPage==='transactions')renderTransactions();});
  fbListen('incidents',v=>{D.incidents=v?Object.values(v).sort((a,b)=>(b.ts||0)-(a.ts||0)):[];if(_curPage==='incidents')renderIncidents();const pendingCount=D.incidents.filter(i=>i.status==='Open').length;const btn=document.getElementById('ntab-incidents');if(btn)btn.classList.toggle('alert',pendingCount>0);});
  fbListen('broadcast',v=>{D.broadcast=v;if(v?.msg){const dis=localStorage.getItem('ch_bc_dis');if(dis!==String(v.ts))showBC(v);}else hideBC();});
  fbListen('calEntries',v=>{
    D.calEntries={};
    if(v)for(const[k,entries]of Object.entries(v))if(entries&&typeof entries==='object'){D.calEntries[k]={};for(const[ek,e]of Object.entries(entries))D.calEntries[k][ek]={...e,_key:ek};}
    if(selCalDate)renderCalDay(selCalDate);
  });

  showPage(CU.isAdmin?'dashboard':'my-dashboard');
  scheduleReminders();
  scheduleEscalation();
}

function rerender(){
  if(_curPage==='dashboard')renderDashboard();
  else if(_curPage==='tasks')renderTasks();
  else if(_curPage==='members')renderMembers();
  else if(_curPage==='my-tasks')renderMyTasks();
  else if(_curPage==='my-dashboard')renderMyDashboard();
  else if(_curPage==='calendar')renderCalendar();
  else if(_curPage==='transactions')renderTransactions();
  else if(_curPage==='reports')renderReports();
  else if(_curPage==='incidents')renderIncidents();
}

function showPage(p){
  _curPage=p;
  ['dashboard','tasks','members','transactions','reports','incidents','calendar','my-tasks','my-dashboard'].forEach(pg=>{
    const el=document.getElementById('pg-'+pg);if(el)el.style.display=pg===p?'':'none';
    const b=document.getElementById('ntab-'+pg);if(b)b.classList.toggle('active',pg===p);
  });
  rerender();
}

// Broadcast
function showBC(v){document.getElementById('bc-msg').textContent=v.msg;document.getElementById('bc-time').textContent='Sent '+new Date(parseInt(v.ts)).toLocaleString('en-PH');document.getElementById('bc-bar').style.display='flex';document.getElementById('nb-title').textContent='Team Announcement';document.getElementById('nb-body').textContent=v.msg;const nb=document.getElementById('notif-banner');nb.classList.add('show');setTimeout(()=>nb.classList.remove('show'),8000);}
function hideBC(){document.getElementById('bc-bar').style.display='none';}
function dismissBC(){if(D.broadcast)localStorage.setItem('ch_bc_dis',String(D.broadcast.ts));hideBC();}
async function sendBC(){const msg=document.getElementById('bc-input')?.value.trim();if(!msg){toast('Enter a message');return;}const ts=Date.now();await fbSet('broadcast',{msg,ts,sentBy:CU.name});localStorage.removeItem('ch_bc_dis');closeModal('modal-broadcast');document.getElementById('bc-input').value='';toast('Broadcast sent!');}

// Dashboard (Admin)
function renderDashboard(){
  const date=ds(viewDate);
  const sched=D.tasks.filter(t=>isSched(t,viewDate));
  const byS={Done:[],Ongoing:[],Pending:[],'Awaiting Approval':[]};
  sched.forEach(t=>{const s=getOv(t.id,date);(byS[s]||(byS[s]=[])).push(t);(byS['Pending']||(byS['Pending']=[]));});

  // Escalated tasks check
  const escalated=sched.filter(t=>{const s=getOv(t.id,date);return s!=='Done'&&isOverdue(t,date);});
  let escHtml='';
  if(escalated.length){escHtml=`<div class="esc-banner"><span style="font-size:18px">⚠️</span><div><div style="font-weight:700;color:var(--orange);font-size:13px">Escalation Alert — ${escalated.length} overdue task${escalated.length>1?'s':''}</div><div style="font-size:12px;color:var(--text3)">${escalated.map(t=>t.title).join(' · ')}</div></div></div>`;}

  const secCfg=[{k:'Pending',l:'Pending',c:'sh-red'},{k:'Ongoing',l:'Ongoing',c:'sh-yellow'},{k:'Awaiting Approval',l:'Awaiting Approval',c:'sh-blue'},{k:'Done',l:'Completed',c:'sh-green'}];
  let secs=secCfg.map(sc=>{
    const list=byS[sc.k]||[];if(!list.length)return'';
    const rows=list.map(t=>{
      const st=getOv(t.id,date),info=getSt(t.id,date),ov=isOverdue(t,date)&&st!=='Done';
      const mAv=(t.assignees||[]).slice(0,4).map(u=>`<span class="av" title="${getMN(u)}" style="width:20px;height:20px;font-size:8px;margin-right:-2px">${ini(getMN(u))}</span>`).join('');
      const evCount=Object.keys(info.evidence||{}).length;
      return `<tr class="${ov?'overdue':''}">
        <td><div style="font-weight:600">${t.title}${ov?'&nbsp;<span style="color:var(--red);font-size:10px;font-weight:700">OVERDUE</span>':''}</div><span class="freq-chip fc-${t.freq}">${t.freq}</span></td>
        <td><span class="dl-chip${ov?' overdue':''}">${t.deadline||'—'}</span></td>
        <td>${mAv}${(t.assignees||[]).length>4?`<span style="font-size:11px;color:var(--text3)"> +${t.assignees.length-4}</span>`:''}${!(t.assignees||[]).length?'<span style="color:var(--text4);font-size:12px">Unassigned</span>':''}</td>
        <td>${statusBadge(st,t.id,date)}</td>
        <td style="font-size:12px;color:var(--text3)">${info.remarks||'—'}</td>
        <td style="white-space:nowrap">
          <button class="btn sm edit" onclick="openStatusModal(${t.id},'${date}')" style="margin-right:3px">Update</button>
          ${evCount?`<button class="btn sm" onclick="viewEvidence(${t.id},'${date}')">${evCount} file${evCount>1?'s':''}</button>`:''}
        </td>
      </tr>`;
    }).join('');
    return `<div class="section-hdr ${sc.c}">${sc.l} <span style="opacity:.7">(${list.length})</span></div><div class="tbl-wrap"><table><thead><tr><th>Task</th><th>Deadline</th><th>Assigned</th><th>Status</th><th>Remarks</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }).join('');

  document.getElementById('pg-dashboard').innerHTML=`
    <div class="page-header">
      <div class="page-title">${ds(viewDate)===ds(now())?'Dashboard — Today':'Dashboard — '+fmtD(viewDate)}</div>
      <div class="date-nav">
        <button class="nav-arrow" onclick="viewDate.setDate(viewDate.getDate()-1);rerender()">&#8592;</button>
        ${dateSel(viewDate)}
        <button class="nav-arrow" onclick="viewDate.setDate(viewDate.getDate()+1);rerender()">&#8594;</button>
        <button class="btn warning" onclick="openModal('modal-broadcast')" style="margin-left:4px">Broadcast</button>
        <button class="btn sm" onclick="openRemind()">Reminders</button>
      </div>
    </div>
    ${escHtml}
    ${metricsHTML(date,sched)}
    ${!sched.length?'<div class="empty-state">No tasks scheduled for this day.</div>':secs}`;
}

// Tasks
function renderTasks(){
  const el=document.getElementById('pg-tasks');if(!el)return;
  if(!D._tasksLoaded){el.innerHTML='<div class="empty-state"><div class="spinner" style="margin:0 auto 12px"></div>Loading...</div>';return;}
  const groups={daily:'Daily',weekly:'Weekly',monthly:'Monthly',quarterly:'Quarterly',eom:'End of Month',occasional:'Occasional',other:'Other'};
  let html=`<div class="page-header"><div class="page-title">Task Management</div><button class="btn primary" onclick="openTaskForm(null)">+ Add Task</button></div>`;
  let any=false;
  for(const[freq,label]of Object.entries(groups)){
    const list=D.tasks.filter(t=>t.freq===freq);if(!list.length)continue;any=true;
    const rows=list.map(t=>{
      const sc=t.freq==='weekly'?(DOW[parseInt(t.dow)]||''):t.freq==='daily'?'Every day':t.freq==='monthly'?`${t.dayOfMonth||1}${['th','st','nd','rd'][Math.min((t.dayOfMonth||1)%10,3)]||'th'} of month`:t.freq==='quarterly'?'1st of quarter':t.freq==='eom'?'Last day of month':'—';
      const mAv=(t.assignees||[]).slice(0,5).map(u=>`<span class="av" title="${getMN(u)}" style="width:20px;height:20px;font-size:8px;margin-right:2px">${ini(getMN(u))}</span>`).join('');
      return `<tr><td><div style="font-weight:600">${t.title}</div>${t.note?`<div style="font-size:11px;color:var(--text3)">${t.note}</div>`:''}</td>
        <td><span class="freq-chip fc-${t.freq}">${sc}</span></td>
        <td><span class="dl-chip">${t.deadline||'—'}</span></td>
        <td>${mAv}${(t.assignees||[]).length>5?`<span style="font-size:11px;color:var(--text3)">+${t.assignees.length-5}</span>`:''}${!(t.assignees||[]).length?'<span style="color:var(--text4);font-size:12px">None</span>':''}</td>

  const q=(document.getElementById('ft-ms')?.value||'').toLowerCase(),drop=document.getElementById('ft-mdrop');if(!drop)return;
  const approved=D.members.filter(m=>m.approved);

  drop.innerHTML=f.length?f.map(m=>`<div class="mdrop-item${_selM.includes(m.username)?' sel':''}" onclick="ftTogM('${m.username}')">

async function saveTask(){

  const freq=document.getElementById('ft-freq')?.value;

  const task=D.tasks.find(t=>t.id==taskId);if(!task)return;

  let body=ov?`<div class="esc-banner" style="margin-bottom:12px"><span>⚠️</span><div style="font-size:13px;font-weight:700;color:var(--orange)">This task is past its deadline</div></div>`:'';
  if(ms.length){
    body+=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Per-member status — <b>${fmtD(new Date(date+'T00:00:00'))}</b></div>`;
    body+=`<div class="tbl-wrap"><table><thead><tr><th>Member</th><th>Role</th><th>Status</th><th>Remarks</th><th>Evidence</th></tr></thead><tbody>`;
    ms.forEach(u=>{

      const evList=Object.entries((info.evidence||{})).filter(([k])=>k.startsWith(u+'_'));
      const evHtml=evList.map(([k,v])=>`<a href="${v.url}" target="_blank"><img class="evidence-thumb" src="${v.url}" onerror="this.style.display='none'" title="${v.name}"/></a>`).join('');
      body+=`<tr>
        <td><div style="display:flex;align-items:center;gap:6px"><span class="av" style="width:22px;height:22px;font-size:8px">${ini(name)}</span>${name}</div></td>
        <td><span style="font-size:11px;color:var(--text3)">${role}</span></td>
        <td>${can?`<select class="finput nb" style="padding:4px 7px;font-size:12px;width:auto" onchange="smMember(${taskId},'${date}','${u}',this.value)">
          <option${mst==='Pending'?' selected':''}>Pending</option>
          <option${mst==='Ongoing'?' selected':''}>Ongoing</option>
          <option${mst==='Awaiting Approval'?' selected':''}>Awaiting Approval</option>
          <option${mst==='Done'?' selected':''}>Done</option>
        </select>`:`<span class="sbadge ${sbc(mst)}" style="cursor:default"><span class="sdot ${sdc(mst)}"></span>${mst}</span>`}</td>
        <td>${can?`<input class="finput nb" style="font-size:12px;padding:4px 7px" placeholder="Remark..." value="${mrem}" onchange="smMRem(${taskId},'${date}','${u}',this.value)"/>`:`<span style="font-size:12px;color:var(--text3)">${mrem||'—'}</span>`}</td>
        <td>
          ${evHtml}
          ${can?`<div><input type="file" id="ev-${u}" accept="image/*,application/pdf" style="display:none" onchange="uploadEvidence(${taskId},'${date}','${u}',this)"/>
          <button class="btn sm" style="margin-top:4px" onclick="document.getElementById('ev-${u}').click()">+ File</button></div>`:''}
        </td>
      </tr>`;
    });
    body+='</tbody></table></div>';
  }
  if(CU.isAdmin){
    const ov2=info.overall||'Pending';
    body+=`<div class="fg fg2" style="margin-top:10px">
      <div><label class="flabel">Overall Status</label><select class="finput nb" onchange="smOverall(${taskId},'${date}',this.value)">
        <option${ov2==='Pending'?' selected':''}>Pending</option><option${ov2==='Ongoing'?' selected':''}>Ongoing</option>
        <option${ov2==='Awaiting Approval'?' selected':''}>Awaiting Approval</option><option${ov2==='Done'?' selected':''}>Done</option>
      </select></div>
      <div><label class="flabel">Overall Remarks</label><input class="finput nb" value="${info.remarks||''}" onchange="smORem(${taskId},'${date}',this.value)"/></div>
    </div>
    <div class="form-actions"><button class="btn success" onclick="approveAll(${taskId},'${date}')">Approve All Done</button><button class="btn" onclick="closeModal('modal-status')">Close</button></div>`;
  } else {
    body+=`<div class="form-actions"><button class="btn" onclick="closeModal('modal-status')">Close</button></div>`;
  }
  document.getElementById('mst-body').innerHTML=body;openModal('modal-status');
}

async function smMember(tid,date,u,val){
  const k=sKey(tid,date),task=D.tasks.find(t=>t.id==tid),cur=getSt(tid,date);
  const mems={...(cur.members||{}),[u]:val};
  const vals=(task?.assignees||[]).map(x=>mems[x]||'Pending');
  const overall=vals.every(v=>v==='Done')?'Done':vals.every(v=>v==='Awaiting Approval'||v==='Done')?'Awaiting Approval':vals.some(v=>v==='Ongoing'||v==='Done')?'Ongoing':'Pending';
  const completedLate=val==='Done'&&isOverdue(task,date);
  await fbUpd(`statuses/${k}`,{members:mems,overall});
  await logAct(tid,date,getMN(u),val,completedLate?'LATE':'');
  toast(val==='Awaiting Approval'?'Submitted for approval!':'Status updated');
}
async function smMRem(tid,date,u,val){await fbUpd(`statuses/${sKey(tid,date)}/memberRemarks`,{[u]:val});}
async function smOverall(tid,date,val){await fbUpd(`statuses/${sKey(tid,date)}`,{overall:val});await logAct(tid,date,CU.name,val,'');toast('Overall updated');}
async function smORem(tid,date,val){await fbUpd(`statuses/${sKey(tid,date)}`,{remarks:val});}
async function approveAll(tid,date){
  const task=D.tasks.find(t=>t.id==tid);const k=sKey(tid,date);const cur=getSt(tid,date);
  const mems={...(cur.members||{})};
  (task?.assignees||[]).forEach(u=>{if(mems[u]==='Awaiting Approval')mems[u]='Done';});
  await fbUpd(`statuses/${k}`,{members:mems,overall:'Done'});
  await logAct(tid,date,CU.name,'Approved All','');
  toast('All approved as Done!');openStatusModal(tid,date);
}

async function uploadEvidence(tid,date,username,input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('File must be under 5MB');return;}
  toast('Uploading...',10000);
  try{
    const path=`evidence/${tid}/${date}/${username}_${Date.now()}_${file.name}`;
    const ref=FST.ref(path);await ref.put(file);
    const url=await ref.getDownloadURL();
    const k=sKey(tid,date);const eKey=`${username}_${Date.now()}`;
    await fbUpd(`statuses/${k}/evidence`,{[eKey]:{url,name:file.name,uploadedBy:getMN(username),ts:Date.now()}});
    toast('Evidence uploaded!');openStatusModal(tid,date);
  }catch(e){toast('Upload failed: '+e.message);}
}

  document.getElementById('mev-body').innerHTML=evs.length?evs.map(([k,v])=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">

}

async function removeM(username){

async function bulkImport(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'}),ws=wb.Sheets[wb.SheetNames[0]],data=XLSX.utils.sheet_to_json(ws,{header:1});
      let added=0;
      for(const row of data){
        const name=(row[0]||'').toString().trim(),user=(row[1]||'').toString().trim().toLowerCase(),pass=(row[2]||'').toString().trim(),role=(row[3]||'Member').toString().trim();
        if(name&&user&&pass&&user!==ADMIN_UN&&!D.members.find(m=>m.username===user)){await fbPush('members',{name,username:user,password:pass,role,approved:true});added++;}
      }
      toast(`Imported ${added} member(s)`);
    }catch(e){toast('Could not read file');}
  };
  reader.readAsBinaryString(file);evt.target.value='';
}

// Reports
function renderReports(){
  const el=document.getElementById('pg-reports');if(!el)return;
  // Build compliance data per member
  const memberStats={};
  D.members.forEach(m=>{memberStats[m.username]={name:m.name,role:m.role||'Member',total:0,done:0,late:0,pending:0};});

  // Look at last 30 days
  const dates=[];for(let i=0;i<30;i++){const d=new Date(now());d.setDate(now().getDate()-i);dates.push(ds(d));}

  dates.forEach(date=>{
    const d=new Date(date+'T00:00:00');
    D.tasks.forEach(t=>{
      if(!isSched(t,d))return;
      (t.assignees||[]).forEach(u=>{
        if(!memberStats[u])return;
        const mst=(getSt(t.id,date).members||{})[u]||'Pending';
        memberStats[u].total++;
        if(mst==='Done')memberStats[u].done++;
        else memberStats[u].pending++;
      });
    });
  });

  // Late completions from actLog
  D.actLog.filter(l=>l.note==='LATE').forEach(l=>{
    const task=D.tasks.find(t=>t.id==l.taskId);
    if(task)(task.assignees||[]).forEach(u=>{if(memberStats[u])memberStats[u].late++;});
  });

  const sorted=Object.values(memberStats).sort((a,b)=>{const ra=a.total?a.done/a.total:0,rb=b.total?b.done/b.total:0;return rb-ra;});

  const rows=sorted.map(m=>{
    const rate=m.total?Math.round(m.done/m.total*100):0;
    const barColor=rate>=80?'var(--green)':rate>=50?'var(--yellow)':'var(--red)';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:7px"><span class="av" style="width:22px;height:22px;font-size:8px">${ini(m.name)}</span>${m.name}</div></td>
      <td><span class="role-badge">${m.role}</span></td>
      <td style="text-align:center">${m.total}</td>
      <td style="text-align:center;color:var(--green);font-weight:600">${m.done}</td>
      <td style="text-align:center;color:var(--red)">${m.pending}</td>
      <td style="text-align:center;color:var(--orange)">${m.late}</td>
      <td style="min-width:120px"><div style="display:flex;align-items:center;gap:6px"><div class="prog-bar" style="flex:1;height:6px"><div class="prog-fill" style="width:${rate}%;background:${barColor}"></div></div><span style="font-size:11px;font-weight:700;color:${barColor}">${rate}%</span></div></td>
    </tr>`;
  }).join('');

  el.innerHTML=`<div class="page-header"><div class="page-title">Compliance Report — Last 30 Days</div>
    <div style="display:flex;gap:8px"><button class="btn sm" onclick="exportReport()">Export Excel</button></div>
  </div>
  <div class="tbl-wrap"><table><thead><tr><th>Member</th><th>Role</th><th>Total Tasks</th><th>Completed</th><th>Pending</th><th>Late</th><th>Compliance Rate</th></tr></thead>
  <tbody>${rows||'<tr><td colspan="7" class="empty-state">No data yet</td></tr>'}</tbody></table></div>`;
}

function exportReport(){
  const rows=[];
  D.members.forEach(m=>{
    let total=0,done=0,late=0;
    const dates=[];for(let i=0;i<30;i++){const d=new Date(now());d.setDate(now().getDate()-i);dates.push(ds(d));}
    dates.forEach(date=>{const d=new Date(date+'T00:00:00');D.tasks.forEach(t=>{if(!isSched(t,d))return;if(!(t.assignees||[]).includes(m.username))return;const mst=(getSt(t.id,date).members||{})[m.username]||'Pending';total++;if(mst==='Done')done++;});});
    D.actLog.filter(l=>l.note==='LATE'&&l.who===m.name).forEach(()=>late++);
    rows.push({Name:m.name,Role:m.role||'Member','Total Tasks':total,'Completed':done,'Pending':total-done,'Late Completions':late,'Compliance Rate %':total?Math.round(done/total*100):0});
  });
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Report');
  XLSX.writeFile(wb,`ComplianceHub_Report_${ds(now())}.xlsx`);
}

// Escalation
function scheduleEscalation(){
  setInterval(async()=>{
    const date=ds(now());
    D.tasks.filter(t=>isSched(t,now())).forEach(async t=>{
      const ov=getOv(t.id,date);
      if(ov!=='Done'&&isOverdue(t,date)){
        const k=sKey(t.id,date);
        const cur=await fbGet(`statuses/${k}/escalated`);
        if(!cur){
          await fbUpd(`statuses/${k}`,{escalated:true,overall:'Escalated'});
          await logAct(t.id,date,'System','Escalated','AUTO');
          await fbPush('incidents',{taskId:t.id,title:t.title,severity:'High',status:'Open',description:`Auto-escalated: Task "${t.title}" was not completed by deadline.`,reportedBy:'System',ts:Date.now(),date});
        }
      }
    });
  },5*60*1000); // check every 5 min
}

// Calendar
function calKey(d){return`${CU.username}_${d}`.replace(/[.#$\/\[\]]/g,'_');}
function getCalE(d){const k=calKey(d);return D.calEntries[k]?Object.values(D.calEntries[k]):[];}
function getExpandedCalE(d){
  const direct=getCalE(d),dDate=new Date(d+'T00:00:00'),recurring=[];
  for(const[sk,entries]of Object.entries(D.calEntries)){
    if(!entries)continue;
    for(const[ek,e]of Object.entries(entries)){
      if(!e.recur||e.recur==='none')continue;
      const orig=new Date((e.originDate||'2000-01-01')+'T00:00:00');
      if(orig>=dDate)continue;if(ds(orig)===d)continue;
      let match=false;
      if(e.recur==='daily')match=true;
      if(e.recur==='weekly')match=dDate.getDay()===orig.getDay();
      if(e.recur==='monthly')match=dDate.getDate()===orig.getDate();
      if(match)recurring.push({...e,_key:ek,_recurring:true});
    }
  }
  return[...direct,...recurring];
}

async function saveCalE(dds){
  const title=document.getElementById('ce-t')?.value.trim();if(!title){toast('Title required');return;}
  const type=document.getElementById('ce-type')?.value,time=document.getElementById('ce-time')?.value.trim(),note=document.getElementById('ce-note')?.value.trim(),recur=document.getElementById('ce-recur')?.value||'none';
  await fbPush(`calEntries/${calKey(dds)}`,{title:time?`${title} (${time})`:title,type,note,recur,originDate:dds});
  closeModal('modal-cal');toast('Entry saved');calSel(dds);
}
async function calRemE(dds,ek){await fbDel(`calEntries/${calKey(dds)}/${ek}`);toast('Removed');if(selCalDate)renderCalDay(selCalDate);}

// Reminders
function openRemind(){
  const date=ds(now());
  const myT=D.tasks.filter(t=>{if(!isSched(t,now()))return false;return CU.isAdmin||(t.assignees||[]).includes(CU.username);});
  const getS=t=>CU.isAdmin?getOv(t.id,date):((getSt(t.id,date).members||{})[CU.username]||'Pending');
  const rows=myT.map(t=>{const st=getS(t),ov=isOverdue(t,date)&&st!=='Done';return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--yellow-mid);font-size:13px${ov?';background:var(--red-light);margin:0 -8px;padding:8px':''}" ><span style="font-weight:500">${t.title}${ov?' ⚠️':''}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--text3)">${t.deadline}</span><span class="sbadge ${sbc(st)}" style="cursor:default;font-size:10px"><span class="sdot ${sdc(st)}"></span>${st}</span></div></div>`;}).join('');
  document.getElementById('mr-body').innerHTML=`<div style="background:var(--yellow-light);border:1px solid var(--yellow-mid);border-radius:var(--radius);padding:14px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:8px">${fmtD(now())}</div>${rows||'<div style="color:var(--green);font-weight:600;font-size:13px">All tasks complete!</div>'}</div>`;
  openModal('modal-remind');
}
function scheduleReminders(){setInterval(()=>{const n=now(),h=n.getHours(),m=n.getMinutes();if((h===9&&m===0)||(h===16&&m===50))openRemind();},60000);}

// Close modals on bg click
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');}));
document.addEventListener('click',e=>{const drop=document.getElementById('ft-mdrop'),search=document.getElementById('ft-ms');if(drop&&search&&!drop.contains(e.target)&&e.target!==search)drop.style.display='none';});
</script>
